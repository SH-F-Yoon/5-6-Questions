은행들에 변화가 있었나요? 과거에는 은행이 어땠나요? 지금은 어떤가요? 변화에 대해 상세히 설명해 주세요.", "묘사", ""], ["I'd like to give you a situation to act out. You are planning to open a bank accout. Go to the bank and ask the clerk 3 or 4 questions about opening a new account.", "상황을 줄테니 연기해보세요. 당신은 새 계좌를 열려고 합니다. 은행에 가서 직원에게 새로운 계좌 개설과관련하여 질문을 해보세요.", "RP", ""], ["I'm sorry, but there is a problem I need you to resolve. You found out that you just left your credit card behind at a restaurant you ate at. Call the restaurant and explain your situation, and ask them hou you can retrieve your card.", "해결해야 할 문제가 있습니다. 당신이 식사를 했던 식당에 신용카드를 두고 온 사실을 알게 되었습니다. 식당에 전화해 상황을 설명하고, 카드를 찾기 위해 어떻게 해야 하는지 질문해보세요.", "RP", ""], ["Technology has changed the way we approach banking services. Can you describe how online banking has evolved over the years and discuss the impact of technolgy on customers and banks?", "기술은 우리가 은행 서비스에 접근하는 방식을 바꾸어 놓았습니다. 온라인 뱅킹이 지난 몇 년간 어떻게발전해 왔는지 설명하고 기술이 고객과 은행에 미치는 영향에 대해 얘기해보세요.", "비교", "IH-AL"], ["Banks have undergone significant changes over the years. How do you think banking services and practices have changed from the past compared to today? What are the differences you've noticed?", "은행은 지난 수년간 상당한 변화를 겪어 왔습니다. 오늘날과 비교하여 은행 서비스와 관행이 과거와 어떻게 달라졌다고 생각하십니까? 눈에 띄는 차이점은 어떤것들이 있나요?", "비교", "IH-AL"], ["Bankers play a crucial role in the financial system. What do you think are the qualifications required for someone to become a banker today? Plus, what are the duties and responsibilities of bankers?", "은행원은 금융 체계에서 중요한 역할을 합니다. 오늘날 은행원이 되기 위해 요구되는 자격 요건들은 무엇이라고 생각하나요? 게다가, 은행원의 업무는 무엇인가요?", "묘사", ""]]}, {"ch": "CH19", "title": "호텔", "q": [["Tell me about the hotels in your country. Where are they usually located? Do they have any facilities that are unique to your country? Give as many details as possible.", "당신 나라의 호텔에 대해 이야기해 주세요. 어디에 주로 위치해 있나요? 당신 나라에만 있는 독특한 시설이 있나요? 되도록 상세히 설명해 주세요.", "묘사", ""], ["What do you usually do when you arrive at a hotel? Describe the steps you take when you stay at a hotel.", "당신이 호텔에 도착하면 주로 무엇을 하나요? 당신이호텔에 숙박할 때 거치는 절차를 묘사해 주세요.", "묘사", ""], ["Please describe a memorable experience you have had while staying at a hotel. What happened? What made the experience memorable?", "호텔에 숙박하면서 가장 기억에 남았던 경험에 대해묘사해 주세요. 무슨 일이 있었나요? 무엇 때문에 그경험이 기억에 남나요?", "경험", ""], ["Tell me about a memorable experience you have had while staying at a hotel. When and where was it? What happened? Describe the experience in detail, and explain why it was so memorable.", "호텔에 머무르면서 겪은 가장 기억에 남는 경험에 대해 이야기해 주세요. 언제 어디에서였나요? 어떤 일이 있었나요? 그 경험에 대해 상세히 묘사하고 왜 기억에 남는지 설명해 주세요.", "경험", ""], ["When was your most recent stay at a hotel? Which hotel did you stay at? What did you do at the hotel? Give me as many details as possible.", "가장 최근에 호텔에 머무른 것은 언제였나요? 어느호텔에서 머물렀나요? 호텔에서 무엇을 하셨나요? 되도록 상세히 설명해 주세요.", "경험", ""], ["I’d like to give you a situation to act out. Imagine that you are staying at a hotel and have a free day to explore the city. Go to the front desk and ask 3 or 4 questions about what to do in the city.", "당신이 호텔에 묵고 도시를 탐험할 수 있는 자유로운하루를 보내고 있다고 상상해 보세요. 프런트에 가서도시에서 무엇을 해야 할지에 대해 서너 가지 질문을하세요.", "RP", ""], ["I'm sorry, but there's a problem I need you to resolve. You left your bag in the taxi on the way to hotel. Call the taxi company and ask them how you can retrieve the bag.", "문제가 생겼습니다. 호텔로 가는 길에 택시 안에 가방을 두고 왔습니다. 택시 회사에 전화해서 가방을 찾을수 있는 방법을 물어보세요.", "RP", ""], ["Can you remember a time you stayed at a hotel for the last time? Where was it? What happened? Why is it so memorable?", "당신이 마지막으로 호텔에 머물렀던 때를 기억할 수있나요? 어디에 있었나요? 무슨 일이 있었나요? 어떤 점이 기억에 남나요?", "경험", ""], ["I’d like to give you a situation to act out. You are going to stay at a hotel. Ask the hotel staff 3 or 4 questions to make a reservation.", "호텔에 머무르려고 합니다. 예약을 하기 위한 질문을서너 가지 해보세요.", "RP", ""], ["I'm sorry, but there's a problem I need you to resolve. The one you wanted to book is not available. Explain to the hotel staff why you need the room, and give 2 or 3 suggestions to make a reservation", "예약을 하려던 방이 나갔습니다. 호텔 직원에게 왜 방이 필요한지 설명하고, 예약을 하기 위해 제안 두 세개를 해보세요.", "RP", ""], ["I'm sorry, but there's a problem I need you to resolve. You found a problem in the room while you are staying at the hotel. Tell the hotel staff about the situation, and ask what they can do.", "호텔에 머물고 있는데, 방에 문제를 발견했습니다. 호텔 직원에게 상황을 설명하고, 뭘 해줄 수 있는지 물어보세요.", "RP", ""]]}, {"ch": "CH20", "title": "약속·모임·미용실", "q": [["People make appointments for a variety of reasons. What kinds of appointments do you usually make with people? Who do you make them with?", "사람들은 다양한 이유로 약속을 잡습니다. 당신은 사람들과 주로 어떤 종류의 약속을 잡나요? 그 약속들을 누구와 하나요?", "묘사", ""], ["People gather for different reasons. What kinds of gathering are there? How do people gather and what do they do?", "사람들은 다양한 이유로 모임을 합니다. 어떤 종류의모임이 있나요? 사람들이 어떻게 모이고 어떤 것들을하나요?", "묘사", ""], ["Where do you like to meet your friends? Why do you prefer this place? Provide as many details as possible in your response.", "당신은 친구들을 어디서 만나는 것을 좋아하나요? 그장소를 왜 선호하나요? 답변에 되도록 상세한 내용을많이 제시하세요.", "RP", ""], ["How have people's gatherings changed from the past to the present? Tell me as much detail as possible about the similarities and differences between the ways in which people gather from the past and the present.", "사람들의 모임이 과거와 현재 어떻게 바뀌었나요? 과거와 현재의 사람들이 모이는 방식이 어떤 유사점이있고 차이점이 있는지 최대한 자세히 얘기해 주세요.", "비교", "IH-AL"], ["What do people talk about or worry about meetings? What are some of the causes? Tell me about people's concerns about meetings and efforts to resolve them.", "사람들이 모임에 대해 얘기하는 점이나 염려하는 점은 무엇인가요? 그런 원인에는 어떤 것들이 있나요? 사람들이 모임에 대해 우려하는 점과 해결하기 위한노력에 대해 얘기해 주세요.", "이슈", "AL"], ["Tell me about a particularly memorable appointment with your friends. What made this experience so unforgettable? Give me as many details as you can.", "친구들과의 특히 기억에 남는 약속에 대해 이야기해주세요. 무엇이 이 경험을 그렇게 잊을 수 없도록 만들었나요? 가능한 한 상세한 내용을 많이 알려주세요.", "경험", ""], ["People set up appointments for various reasons. What sort of appointments do you usually make, social or otherwise? Who do you usually meet with? Where do you usually meet them? Give me as many details as possible.", "사람들은 여러 가지 이유로 약속을 잡습니다. 당신은어떤 종류의 약속을 주로 잡나요, 사교적인 것인가요,아니면 다른 것인가요? 주로 누구와 함께 만나나요? 어디서 주로 만나나요? 되도록 상세히 설명해 주세요.", "묘사", ""], ["Tell me about the most memorable appointment you have ever had. What kind of appointment was it? Who did you meet? What did you do? Did anything unexpected or interesting occur? Why was it so memorable?", "지금까지 했던 약속 중 가장 기억에 남는 것에 대해서이야기해 주세요. 어떤 종류의 약속이었나요? 누구를만났나요? 무엇을 했`나요? 예상하지 못했던 일이나흥미로운 일이 있었나요? 그것이 왜 그렇게 기억에남았나요?", "경험", ""], ["When you want to meet up with someone, how do you get in touch with him or her? Do you make phone calls, send an e-mail, or do something else? How does the exchange usually go? Tell me about the process from beginning to end.", "누군가와 만나고 싶을 때, 당신은 어떻게 상대에게 연락을 취하나요? 전화를 거나요, 이메일을 보내나요,아니면 다른 방법을 쓰나요? 연락을 주고받는 것은보통 어떻게 진행되나요? 그 과정을 처음부터 끝까지이야기해 주세요.", "RP", ""], ["Tell me about the hair salons in your country. Where are they usually located? Do they have any services or facilities that are unique to your country? Give as many details as possible.", "당신 나라의 미용실에 대해 이야기해 주세요. 어디에주로 위치해 있나요? 당신 나라에만 있는 독특한 시설이나 서비스가 있나요? 되도록 상세히 설명해 주세요.", "묘사", ""], ["How is the hair salon you go different from other hair salons in your country? Is there a difference from other hair salons? Why do you frequently visit that hair salon? Tell me about the hair salon in detail.", "당신이 가는 미용실은 다른 미용실들과 어떻게 다른가요? 차이점이 있나요? 왜 그 미용실을 방문하나요? 당신이 가는 미용실에 대해 자세히 얘기해주세요.", "비교", "IH"], ["When was your most recent visit to a hair salon? What hair services did you get? Who did you get inspired by? Give me as many details as possible.", "가장 최근에 미용실에 간 건 언제였나요? 어떤 헤어스타일을 받았나요? 누구의 헤어스타일을 보고 따라하게 되었나요? 되도록 상세히 설명해 주세요.", "경험", ""], ["I am going to give you a situation to act out. Let’s suppose that you went to a hair salon to change your hair style. Ask the stylist three or four questions about the style you would like to get.", "상황을 줄테니 연기해보세요. 당신은 헤어스타일을바꾸러 미용실에 갔습니다. 어떤 스타일을 원하는지미용사에게 서너 가지 질문을 하세요.", "RP", ""], ["I’m sorry, but there is a problem I need you to resolve. As the service was done, you looked into the mirror, however, you found out that the result was unsatisfying. Approach the stylist, explain the situation, and ask for a way to get a refund.", "죄송하지만 해결해 주셔야 할 문제가 있습니다. 서비스가 끝나면서 거울을 보셨는데, 결과가 불만족스럽습니다. 스타일리스트에게 가서 상황을 설명하고 환불 방법을 물어보세요.", "RP", ""], ["This is the end of the situation. Tell me about a problem you have had at a hair salon. When and where was it? What happened? How did you handle the situation? Describe the experience in as much detail as possible", "상황은 여기까지입니다. 미용실에서 겪은 문제에 대해 얘기해주세요. 언제, 어디에 있었나요? 무슨 일이있었나요? 어떻게 대처했나요? 가능한 한 자세히 설명해 주세요", "경험", ""]]}, {"ch": "CH21", "title": "날씨", "q": [["The weather varies greatly from season to season. Tell me what the weather has been like these days. Provide as many details as possible.", "날씨는 계절마다 매우 다릅니다. 요즘 날씨가 어땠는지 이야기해 주세요. 되도록 상세한 내용을 많이 제시하세요.", "RP", ""], ["I would like to know about the seasons in your country. How many seasons are there? How are they different? What is the weather like in each season?", "저는 당신 나라의 계절에 대해 알고 싶어요. 몇 개의계절이 있나요? 계절들이 어떻게 다른가요? 각 계절의 날씨는 어떤가요?", "묘사", ""], ["Have you ever experienced something memorable because of the weather? Please explain what happened and why it was memorable. Give me as many details as possible.", "당신은 날씨 때문에 기억에 남는 어떤 일을 경험한 적이 있나요? 무슨 일이 있었고 그 일이 왜 기억에 남는지 설명해 주세요. 가능한 한 상세한 내용을 많이 알려주세요.", "경험", ""], ["Have you ever had a memorable or unexpected experience because of unusual weather conditions? When was it? What happened? Tell me about it in as much detail as possible.", "이상 기후 현상 때문에 기억에 남거나 예상하지 못한경험을 한 적이 있나요? 언제였나요? 무슨 일이 있었나요? 그것에 대해 되도록 상세히 이야기해 주세요.", "경험", ""], ["Many people feel that the weather was different when they were children. Have you noticed a change in the weather over the years? Was it different when you were young?", "많은 사람들이 그들이 어렸을 때는 날씨가 달랐다고느낍니다. 당신은 수년간 날씨의 변화를 알아차렸나요? 당신이 어렸을 때는 날씨가 달랐나요?", "묘사", ""], ["Do you think that the weather has changed over the past few years? What was it like in the past? How has it changed? Please describe the differences in detail.", "당신은 지난 몇 년 사이에 날씨가 변했다고 생각하나요? 과거에는 날씨가 어땠나요? 어떻게 변화했나요? 차이점에 대해 상세히 설명해 주세요.", "비교", "IH"], ["Our daily lives can be different depending on the weather. How does the changing weather influence your daily activities and routines?", "우리의 일상 생활은 날씨에 따라 다를 수 있습니다. 변화하는 날씨가 여러분의 일상 활동과 일상에 어떻게 영향을 줄까요?", "이슈", "AL"], ["How do you stay informed about the weather forecast, and why is it important to be aware of upcoming weather conditions?", "여러분은 일기 예보에 대해 어떻게 정보를 유지하고,다가오는 날씨 상황을 아는 것이 왜 중요합니까?", "묘사", ""]]}, {"ch": "CH22", "title": "지형·야외활동", "q": [["Tell me about the geography of your country. Are there a lot of lakes, rivers, beaches or mountains? Please describe it in as much detail as possible.", "당신 나라의 지리와 관련해 이야기해주세요. 호수나강, 해변, 또는 산이 많이 있나요? 가능한 한 자세히설명해주세요.", "묘사", ""], ["I would like to know about the geographic features of your country. What makes them different from other countries? Please describe them in as much detail as possible.", "당신 나라의 지형에 대해 알고 싶어요. 다른 나라에비해 어떤 점이 다른가요? 그것에 대해 되도록 상세히 설명해 주세요.", "묘사", ""], ["What kinds of activities do people in your country usually do for entertainment? Please give me a detailed description of the things that people like to do in your country.", "당신 나라의 사람들은 보통 흥미를 위해 어떤 활동을하나요? 당신 나라의 사람들이 좋아하는 일을 자세히설명해 주세요.", "묘사", ""], ["Describe the most memorable experience you have had outdoors. What is a beautiful place you have been to? Please provide as many details as possible.", "야외 활동 도중 겪었던 가장 기억에 남는 경험을 설명해 주세요. 당신이 가본 아름다운 곳은 어디였나요? 되도록 상세히 설명해주세요.", "경험", ""], ["I'd like to know about a memorable thing that you experienced during your childhood. For example, it could have been a special event or an experience you had with your friends or family members. Tell me about the event and everything that happened.", "어린 시절에 경험했던 기억에 남는 일과 관련해 알고싶습니다. 예를 들어, 친구나 가족과 함께 했던 특별한 일이나 경험이 있었을 수도 있죠. 그 일과 있었던일 전부에 대해 얘기해주세요.", "경험", ""], ["What kind of outdoor activities do people in your country do? Do they enjoy things like jogging, cycling, or hiking? Why do they like to do those activities?", "당신 나라의 사람들은 어떤 야외 활동을 하나요? 사람들이 조깅이나 사이클링, 하이킹 같은 것들을 즐기나요? 그들은 왜 그런 활동을 즐겨 하나요?", "묘사", ""], ["Tell me about the relationship between tourism and geography. How do geographical features attract tourists, and what impact does tourism have on the local environment and culture?", "관광과 지리의 관계에 대해 알려주세요. 지리적 특징은 관광객을 어떻게 유치하며, 관광이 지역 환경과 문화에 어떤 영향을 미치나요?", "이슈", "AL"]]}];
const TYCLASS = {'묘사':'d','경험':'e','비교':'c','이슈':'i','RP':'r'};
let curCh = 0, rate = 0.75, voice = null;
const chtabsEl = document.getElementById('chtabs');
const mainEl = document.getElementById('main');
function pickVoice(){
  const list = speechSynthesis.getVoices();
  const en = list.filter(v=>/^en(-|_|$)/i.test(v.lang));
  const female=/(samantha|ava|allison|susan|karen|moira|tessa|fiona|serena|veena|zira|aria|jenny|jane|nanc|michelle|sonia|emma|amy|joanna|kendra|salli|nicole|female|woman|girl|google us english)/i;
  const male=/(daniel|alex\b|fred|tom\b|david|mark|guy|george|oliver|arthur|rishi|ryan|male)/i;
  const natural=/(natural|neural|online|enhanced|premium|siri)/i;
  const score=v=>{ const n=v.name.toLowerCase(); const us=/en[-_]?us/i.test(v.lang);
    const fem=female.test(n)&&!male.test(n);
    if(us&&fem&&natural.test(n))return 0; if(us&&fem)return 1;
    if(fem&&natural.test(n))return 2; if(fem)return 3; if(us)return 5; return 8; };
  en.sort((a,b)=>score(a)-score(b));
  voice = en[0] || list[0] || null;
}
speechSynthesis.onvoiceschanged = pickVoice; pickVoice();
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function buildTabs(){
  chtabsEl.innerHTML='';
  CHAPTERS.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='chtab'+(i===curCh?' active':'');
    b.innerHTML='<small>'+c.ch+'</small>'+c.title;
    b.onclick=()=>{ stopAll(); curCh=i; render(); window.scrollTo(0,0); };
    chtabsEl.appendChild(b);
  });
}
function render(){
  buildTabs();
  const c=CHAPTERS[curCh];
  document.getElementById('hTitle').textContent=c.ch+' · '+c.title;
  let h='<div class="chead"><span class="badge">질문 '+c.q.length+'개</span>'+
        '<h2>'+esc(c.title)+'</h2><div class="cnt">▶ 영어 질문 듣기 · 문장을 눌러 뜻 보기</div>'+
        '<div class="legend">'+
        '<span class="qty d">묘사</span><span class="qty e">경험</span>'+
        '<span class="qty c">비교</span><span class="qty i">이슈</span>'+
        '<span class="qty r">RP</span>'+
        '<span style="font-size:11px;color:var(--sub);align-self:center;margin-left:2px;">비교 난이도 IM3&lt;IH&lt;IH-AL · 이슈 = AL</span></div></div>';
  c.q.forEach((pair,idx)=>{
    const en=pair[0], ko=pair[1]||'', ty=pair[2]||'묘사', sub=pair[3]||'';
    const tc=TYCLASS[ty]||'d';
    h+='<div class="q" data-i="'+idx+'">'+
       '<div class="numcol"><div class="num">'+(idx+1)+'</div>'+
       '<span class="qty '+tc+'">'+ty+(sub?'<b>'+sub+'</b>':'')+'</span></div>'+
       '<button class="play" aria-label="play">▶</button>'+
       '<div class="txt"><div class="en">'+esc(en)+'</div>'+
       '<div class="kohint">💬 뜻 보기 ▾</div>'+
       '<div class="ko">'+esc(ko)+'</div></div></div>';
  });
  mainEl.innerHTML=h;
  mainEl.querySelectorAll('.q').forEach(el=>{
    const i=+el.dataset.i;
    el.querySelector('.play').onclick=(ev)=>{ ev.stopPropagation(); speak(c.q[i][0], el); };
    el.querySelector('.txt').onclick=()=>{
      el.classList.toggle('show-ko');
      const hint=el.querySelector('.kohint');
      hint.textContent = el.classList.contains('show-ko') ? '💬 뜻 닫기 ▴' : '💬 뜻 보기 ▾';
    };
  });
}
function clearActive(){
  mainEl.querySelectorAll('.q.active').forEach(e=>{e.classList.remove('active');
    e.querySelector('.play').textContent='▶';});
}
function speak(text, el){
  stopAll(); clearActive();
  if(el){ el.classList.add('active'); el.querySelector('.play').textContent='❚❚'; }
  const u=new SpeechSynthesisUtterance(text);
  if(voice) u.voice=voice;
  u.rate=rate; u.pitch=1.05; u.lang=(voice&&voice.lang)||'en-US';
  u.onend=()=>{ clearActive(); }; u.onerror=()=>{ clearActive(); };
  speechSynthesis.speak(u);
}
function stopAll(){ speechSynthesis.cancel(); clearActive(); }
document.getElementById('stopBtn').onclick=stopAll;
document.getElementById('rateSeg').onclick=e=>{
  if(e.target.dataset.r){ rate=+e.target.dataset.r;
    [...e.currentTarget.children].forEach(b=>b.classList.remove('on'));
    e.target.classList.add('on'); }
};
window.addEventListener('pagehide',stopAll);
render();
</script>
</body>
</html>
