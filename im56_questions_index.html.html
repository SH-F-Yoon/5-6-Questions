<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>난이도5/6질문_오픽승혜쌤</title>
<style>
  :root{ --navy:#1f3a5f; --navy2:#2c5282; --line:#e2e6ee; --bg:#f4f6fa;
    --sub:#5a6678; --red:#c0392b; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg); color:#1a2233;}
  header{background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff;
    padding:11px 16px; position:sticky; top:0; z-index:30;}
  header .ch{font-size:13px; opacity:.95; font-weight:800;}
  header h1{margin:3px 0 0; font-size:18px; font-weight:800;}
  header .sub{font-size:12px; opacity:.85; margin-top:3px;}
  .chtabs{display:flex; flex-wrap:nowrap; gap:7px; padding:9px 12px; overflow-x:auto; -webkit-overflow-scrolling:touch;
    background:#fff; border-bottom:1px solid var(--line);
    position:sticky; top:62px; z-index:22;}
  .chtabs::-webkit-scrollbar{display:none;}
  .chtab{flex:0 0 auto; border:1.5px solid var(--line); background:#fff;
    color:var(--sub); border-radius:20px; padding:7px 13px; font-size:13px;
    font-weight:800; white-space:nowrap; cursor:pointer; line-height:1.15;}
  .chtab small{font-size:10px; display:block; opacity:.7; font-weight:700;}
  .chtab.active{background:var(--navy); color:#fff; border-color:var(--navy);}
  main{max-width:820px; margin:0 auto; padding:14px 14px 120px;}
  .chead{margin:6px 2px 14px;}
  .chead .badge{display:inline-block; background:var(--red); color:#fff;
    font-size:12px; font-weight:800; padding:3px 11px; border-radius:14px;}
  .chead h2{margin:8px 0 2px; font-size:21px;}
  .chead .cnt{color:var(--sub); font-size:13px;}
  .legend{display:flex; flex-wrap:wrap; gap:6px; margin-top:9px;}
  .legend .qty{cursor:default;}
  .q{background:#fff; border:1px solid var(--line); border-radius:14px;
    padding:13px 14px; margin-bottom:11px; display:flex; gap:11px; align-items:flex-start;
    box-shadow:0 1px 2px rgba(0,0,0,.03);}
  .numcol{flex:0 0 auto; width:40px; display:flex; flex-direction:column; align-items:center; gap:5px; padding-top:5px;}
  .num{color:var(--sub); font-weight:800; font-size:13px;}
  .qty{font-size:10px; font-weight:800; padding:2px 7px; border-radius:8px; color:#fff; white-space:nowrap; letter-spacing:.2px; text-align:center; line-height:1.15;}
  .qty b{display:block; font-size:8px; font-weight:800; opacity:.92; margin-top:1px; letter-spacing:.3px;}
  .qty.d{background:#2c5282;} .qty.e{background:#2f855a;} .qty.c{background:#6b46c1;}
  .qty.i{background:#c05621;} .qty.r{background:#0d9488;}
  .play{flex:0 0 auto; width:42px; height:42px; border-radius:50%; border:none;
    background:var(--navy); color:#fff; font-size:16px; cursor:pointer; margin-top:2px;
    display:flex; align-items:center; justify-content:center;}
  .play:active{transform:scale(.92);}
  .q.active .play{background:var(--red);}
  .txt{flex:1 1 auto; cursor:pointer; padding-top:2px;}
  .txt .en{font-size:16.5px; line-height:1.5; font-weight:600; color:#1a2233;}
  .kohint{font-size:12px; color:var(--navy2); margin-top:6px; font-weight:700; user-select:none;}
  .ko{display:none; margin-top:7px; font-size:14.5px; line-height:1.55; color:#37425a;
    background:var(--bg); border-radius:9px; padding:9px 11px;}
  .q.show-ko .ko{display:block;}
  .tip{color:var(--sub); font-size:12.5px; text-align:center; margin-top:8px; line-height:1.6;}
  .ctrl{position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--line);
    padding:9px 14px calc(9px + env(safe-area-inset-bottom)); z-index:25;
    display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap;}
  .ctrl .lab{font-size:12px; color:var(--sub); font-weight:700;}
  .seg{display:inline-flex; border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  .seg button{border:none; background:#fff; padding:7px 12px; font-size:13px; font-weight:800;
    color:var(--sub); cursor:pointer;}
  .seg button.on{background:var(--navy); color:#fff;}
  .stopb{border:1px solid var(--line); background:#fff; border-radius:10px; padding:7px 14px;
    font-weight:800; color:var(--navy); cursor:pointer; font-size:13px;}
</style>
</head>
<body>
<header>
  <div class="ch">난이도5/6질문_오픽승혜쌤 🎧</div>
  <h1 id="hTitle">질문 듣기</h1>
  <div class="sub">▶ 를 누르면 영어 질문이 들립니다. 문장을 누르면 한국어 뜻이 보입니다.</div>
</header>
<div class="chtabs" id="chtabs"></div>
<main id="main"></main>
<div class="ctrl">
  <span class="lab">속도</span>
  <div class="seg" id="rateSeg">
    <button data-r="0.6">0.6x</button>
    <button data-r="0.75" class="on">0.75x</button>
    <button data-r="0.9">0.9x</button>
    <button data-r="1">1.0x</button>
  </div>
  <button class="stopb" id="stopBtn">■ 정지</button>
</div>
<script>
const CHAPTERS = [{"ch": "CH1", "title": "구직", "q": [["You indicated in the survey that you are looking for a job. Tell me about the company that you would like to work with. What services or products does it provide to customers?", "설문조사에서 일자리를 찾고 있다고 했습니다. 당신이 일하고 싶은 회사에 대해 얘기해 주세요. 고객에게 어떤 서비스나 제품을 제공하나요?", "묘사", ""], ["You indicated in the survey that you are looking for a job. Tell me about the job you are looking for and what you are preparing for the job.", "설문조사에서 일자리를 찾고 있다고 했습니다. 당신이 찾고 있는 직업과 그 직업을 위해 준비하고 있는 것에 대해 얘기해 주세요.", "묘사", ""], ["Please tell me about where companies are usually located in your country. What are those places like? How are they different from each other?", "한국에서 회사들이 위치한 곳에 대해 묘사해주세요. 그 장소들은 어떤가요? 서로 어떻게 다른가요?", "묘사", ""], ["Tell me about the requirements of the job you are looking for. What do companies require to candidates? How can job seekers prepare for the job?", "당신이 찾고 있는 직업의 자격 요건에 대해 얘기해 주세요. 기업은 지원자에게 무엇을 요구하나요? 구직자는 어떻게 취업을 준비할 수 있나요?", "묘사", ""], ["Please describe the website you visit for job seeking. What is it called and what can you do on that website? How do you use the internet when looking for a job?", "구직을 위해 방문하는 웹사이트를 설명해주세요. 웹사이트의 이름은 무엇이며, 그 웹사이트에서 어떤것들을 할 수 있습니까? 일자리를 찾을 때 인터넷을 어떻게 사용하나요?", "묘사", ""], ["Tell me about a recent job application experience. What was it like, and what happened? Please describe it in as many details as possible.", "최근에 회사에 지원했던 경험에 대해서 얘기해주세요. 어떤 일이었고, 어떤 일이 일어났나요?", "경험", ""], ["Can you tell me how has the way people view jobs and they look for jobs changed? How is it different from the past?", "사람들이 직업을 바라보는 시각과 구직하는 방식이어떻게 바뀌었나요? 과거와 어떻게 달라졌나요?", "비교", "IH-AL"], ["What are the concerns or problems do people talk about when looking for a job? Why do those problems occur and how can people solve the problems?", "사람들이 구직에 대해 이야기하는 걱정이나 문제는무엇인가요? 이러한 문제가 발생하는 이유는 무엇이며, 사람들은 어떻게 문제를 해결할 수 있을까요?", "이슈", "AL"]]}, {"ch": "CH2", "title": "동네·이웃", "q": [["You indicated in the survey that you live in an apartment. What is your neighborhood like? Where is it located? Please describe your neighborhood in detail.", "당신은 설문에서 아파트에 산다고 했습니다. 당신의동네는 어떤가요? 어디에 위치해 있나요? 당신의 동네에 대해 상세히 묘사해 주세요.", "묘사", ""], ["I would like to know about your neighborhood. What does your neighborhood look like? Please describe your neighborhood in as much detail as possible.", "당신의 동네에 대해 알고 싶어요. 동네가 어떻게 생겼나요? 당신의 동네를 되도록 상세히 설명해 주세요.", "묘사", ""], ["I would like to know about your neighbors. Who are they? What do they do? How often do you interact with them?", "당신의 이웃에 대해 알고 싶어요. 그들은 누구인가요? 그들은 무슨 일을 하나요? 당신은 얼마나 자주그들과 교류하나요?", "묘사", ""], ["Can you tell me about your neighbors? Describe one of your neighbors in detail. How did you first become acquainted with that neighbor? Are you close to the person? What do you usually do together?", "당신의 이웃에 대해 말해줄 수 있나요? 당신의 이웃중 한 명을 상세히 설명해 주세요. 그 이웃을 어떻게처음 알게 되었나요? 그 이웃과 친한가요? 보통 함께무엇을 하나요?", "묘사", ""], ["Can you tell me about an interesting or memorable experience you have had in your neighborhood? Tell me about the experience in detail and explain what made it so memorable.", "당신의 동네에서 있었던 재미있거나 기억에 남는 경험에 대해 이야기해 줄 수 있나요? 그 경험에 대해 상세히 이야기하고 무엇 때문에 그 경험이 그렇게 기억에 남게 되었는지 설명해 주세요.", "경험", ""], ["Please tell me about a memorable experience you have had in your neighborhood. When and where did it occur? What happened that made the experience so memorable? Please describe it in detail.", "당신이 동네에서 겪었던 기억에 남는 경험에 대해서이야기해 주세요. 언제 그리고 어디서 그 일이 일어났나요? 어떤 점이 그 경험을 기억에 남게 만들었나요? 그것에 대해 상세히 설명해 주세요.", "경험", ""], ["How has your neighborhood changed from when you were young? Describe in detail how it was in the past, and how it is now.", "당신의 동네가 당신이 어렸을 때에 비해 어떻게 변했나요? 과거에 어땠고, 지금은 어떤지 상세히 묘사해주세요.", "비교", "IM3"], ["What are the concerns or issues that people have in your neighborhood these days? Have you talked about it with your neighbors? When was it? What was it about?", "사람들이 요새 당신이 사는 동네에 대해 염려하거나걱정하는 점은 무엇인가요? 그것에 대해 이웃과 얘기해본 적 있나요? 언제, 어떤 것에 대한 거였나요?", "이슈", "AL"], ["Can you tell me about any changes in your neighborhood. Compare your neighborhood from the past to nowadays in detail. How does that affect your lifestyle?", "당신의 동네에 어떤 변화가 있는지 말해 줄 수 있나요? 과거와 요즘의 동네를 자세히 비교해 보세요. 그것이 당신의 생활 방식에 어떤 영향을 줄까요?", "이슈", "AL"], ["I’d like to talk about any changes in your neighborhood in the last 10 years. Describe in detail the similarities and differences between your neighborhood today and neighborhood when you grew up.", "지난 10년 동안 당신의 동네에 어떤 변화가 있었는지에 대해 이야기하고 싶습니다. 오늘날 당신의 동네와당신이 자랐을 때의 동네의 유사점과 차이점을 자세히 설명하세요.", "비교", "IM3"]]}, {"ch": "CH3", "title": "친구·프로젝트", "q": [["Tell me about one of your friends. What does he or she look like? How did you become friends? Tell me about your friend in as much detail as possible.", "당신의 친구 중 한 명에 대해 이야기해 주세요. 그 친구는 어떻게 생겼나요? 당신은 어떻게 친구가 되었나요? 친구에 대해 되도록 상세히 이야기해 주세요.", "묘사", ""], ["What is the most memorable project you have worked on? What sort of project was it, and why was it memorable? Please describe the project in detail.", "당신이 일해 본 프로젝트 중 가장 기억에 남는 것은무엇인가요? 어떤 종류의 프로젝트였고, 그것이 왜기억에 남나요? 프로젝트를 상세히 설명해 주세요.", "경험", ""], ["Have you ever had a problem while working on a project? What was it? How did you resolve it? Please tell me about it in detail.", "프로젝트를 하는 동안 문제를 경험한 적이 있나요? 무슨 문제였나요? 어떻게 해결하였나요? 그것에 대해 상세히 이야기해 주세요.", "경험", ""], ["Tell me about a recent project you finished. What type of project was it? Was it successful? What steps did you take to complete the project from start to end? Please describe the process in detail.", "당신이 최근에 끝낸 프로젝트에 대해 이야기해 주세요. 어떤 종류의 프로젝트였나요? 성공적이었나요? 그 프로젝트를 마치기 위해 시작부터 끝까지 어떤 단계들을 거쳤나요? 과정을 상세히 설명해 주세요.", "경험", ""]]}, {"ch": "CH4", "title": "집", "q": [["You indicated in the survey that you live in an apartment. Tell me about your home. What does it look like? What types of rooms does it have? Please describe it in detail.", "당신은 설문에서 아파트에 산다고 했습니다. 당신의집에 대해 이야기해 주세요. 집의 외관이 어떻게 생겼나요? 어떤 종류의 방들이 있나요? 그것에 대해서 상세히 묘사해 주세요.", "묘사", ""], ["Please tell me about your house. What’s your favorite room? What does it look like? Why do you like that room?", "당신의 집에 대해서 이야기해 주세요. 당신이 가장 좋아하는 방은 어디인가요? 그곳은 어떻게 생겼나요? 왜 그 방을 좋아하나요?", "묘사", ""], ["Tell me about your bedroom. What does it look like and what do you keep in it? Use as many details as possible to describe it.", "당신의 침실에 대해 이야기해 주세요. 침실은 어떻게생겼고 당신은 침실 안에 무엇을 두고 있나요? 침실을 묘사하기 위해서 되도록 상세한 내용을 많이 사용하세요.", "묘사", ""], ["It is important for a family to spend time together. When do you spend time at home with your family? What does your family usually do at home?", "가족이 함께 시간을 보내는 것은 중요합니다. 당신은언제 가족과 집에서 시간을 보내나요? 당신의 가족은집에서 주로 어떤 일을 하나요?", "묘사", ""], ["Have you made any changes to your house within the last few years? If so, what kinds of changes have you made to your home? Are you satisfied with the changes?", "당신은 지난 몇 년간 집에 변화를 준 적이 있나요? 그렇다면, 당신은 집에 어떤 종류의 변화를 주었나요? 그 변화에 만족하나요?", "경험", ""], ["Compare the home you lived in before to the one you live in now. What are the differences between those two homes? Provide me with as many details as possible.", "당신이 예전에 살았던 집과 지금 살고 있는 집을 비교하세요. 두 집 사이에는 어떤 차이점들이 있나요? 되도록 상세히 설명해 주세요.", "비교", "IM3"], ["I’d like to talk about any changes to your home in the last 10 years. Describe in detail the similarities and differences between your home today and a home when you grew up.", "지난 10년 동안 여러분의 집에 어떤 변화가 있었는지에 대해 이야기하고 싶습니다. 오늘날 여러분의 집과여러분이 자랐을 때의 집의 유사점과 차이점을 자세히 설명하세요.", "비교", "IM3"], ["Have you ever had any problems with your home? What was the problem, and how did you deal with it? Give me as many details as possible.", "집에서 어떤 문제를 겪은 적이 있나요? 문제가 무엇이었으며, 어떻게 해결했나요? 되도록 상세히 설명해주세요.", "경험", ""], ["I’d like to give you a situation to act out. Imagine that you are planning to move and currently looking for a house. Call a real estate agent and explain what kind of houses you would like to get. Ask 3 or 4 questions about the home and services they offer.", "당신이 이사를 계획하고 있고 현재 집을 찾고 있다고상상해보세요. 부동산 중개인에게 전화해서 어떤 집을 얻고 싶은지 설명해보세요. 그들이 제공하는 집과서비스에 대해 서너 가지 질문을 하세요.", "RP", ""], ["I’m sorry, but there’s a problem I need you to resolve. You have got into your house, but found out that there is something wrong with the house. Call the real estate agent, explain the situation and ask what they can do.", "죄송하지만 해결해야 할 문제가 있습니다. 집에 들어가셨지만, 집에 문제가 있다는 것을 알게 되었습니다. 부동산 중개인에게 전화해서 상황을 설명하고 그들이 무엇을 할 수 있는지 물어보세요.", "RP", ""], ["I’m sorry, but there’s a problem I need you to resolve. You noticed that there is a crack in one of your windows. Call the repairperson, explain the situation and ask him or her to repair it as soon as possible.", "해결해야할 문제가 있습니다. 집의 창문 중 하나에 금이 간 것을 알게 되었습니다. 수리기사에게 전화하여,상황을 설명하고, 최대한 빨리 수리를 요청해보세요.", "RP", ""], ["I am going to give you a situation to act out. Imagine that you found a problem at your home. Ask a repair person three or four questions about the problem you want to fix.", "여러분이 집에서 문제를 발견했다고 상상해 보세요. 수리기사에게 고치고 싶은 문제에 대해 서너 가지 질문을 하세요.", "RP", ""], ["I’m sorry. You already made an appointment with the repair person, but a problem has come up. Now, you won’t be available on the day you made a reservation. Call the repair person and explain the situation. Then, give two or three alternatives.", "이미 수리 기사님과 약속을 했는데 문제가 생겼습니다. 지금은 예약한 날에 시간이 안 됩니다. 수리 기사님께 전화해서 상황을 설명해주세요. 그 다음, 2~3가지 대안을 제시해주세요.", "RP", ""], ["The way people get information has diversified. Tell me more about how the way people get information about real estate or their homes has changed. How has it changed? What positive changes has it brought?", "사람들이 정보를 얻는 방식은 다양해졌습니다. 사람들이 부동산이나 집에 관한 정보를 얻는 방식이 어떻게 변화했는지 자세히 말해주세요. 어떻게 바뀌었나요? 어떤 긍정적인 변화를 가져왔나요?", "비교", "IH-AL"], ["There are many different ways people look at home. Please describe in detail how the way people view real estate or houses has changed. How has it changed? Tell me the difference in perceptions of past and present homes.", "사람들이 집을 바라보는 시각은 다양합니다. 사람들이 부동산이나 집을 보는 관점이 어떻게 변화했는지자세히 말해주세요. 어떻게 바뀌었나요? 과거와 현재의 집에 대한 인식의 차이점을 말해주세요.", "비교", "IH-AL"], ["Tell me about the problems or concerns about housing in your country. Why do those issues occur and how do people solve those problems?", "당신의 나라에서 주거에 관련된 문제점이나 염려에대해 얘기해주세요. 왜 그런 문제들이 발생을 하고 사람들은 어떻게 해결하나요?", "이슈", "AL"]]}, {"ch": "CH5", "title": "가구", "q": [["Tell me about your favorite piece of furniture in your house. What does it look like? Why is it your favorite? Give me as many details as possible.", "당신이 집에서 가장 좋아하는 가구에 대해 이야기해주세요. 그 가구는 어떻게 생겼나요? 왜 그 가구를 가장 좋아하나요? 가능한 한 상세한 내용을 많이 알려주세요.", "묘사", ""], ["What is your favorite piece of furniture in the house? How do you use it? What makes it special? Give me as many details as possible.", "당신이 집에서 가장 좋아하는 가구는 무엇인가요? 그것을 어떻게 사용하나요? 무엇이 그 가구를 특별하게만드나요? 되도록 상세히 설명해 주세요.", "묘사", ""], ["Can you tell me about a piece of furniture you bought recently? Where did you buy that? Give me as many details as possible.", "당신이 최근에 산 가구에 대해 이야기해 줄 수 있나요? 당신은 그것을 어디에서 샀나요? 가능한 한 상세한 내용을 많이 알려주세요.", "경험", ""], ["Have you experienced any problems with your electronics? Describe a recent difficulty you faced, and explain how it happened. How did you solve this problem?", "당신의 전자제품과 관련된 어떤 문제를 경험한 적이있나요? 당신이 직면한 최근의 어려움을 묘사하고,어떻게 그 일이 일어났는지 설명해 주세요. 당신은 이문제를 어떻게 해결했나요?", "경험", ""], ["Can you remember a time when you borrowed an electronic appliance that became damaged or broken? What was the problem, and how did it happen? How did you solve it?", "당신이 빌려온 가전제품이 손상되거나 고장 났던 때를 기억할 수 있나요? 문제가 무엇이었고, 어떻게 그일이 일어났나요? 당신은 그것을 어떻게 해결했나요?", "경험", ""], ["The furniture in people’s homes has changed over the years. Is the furniture in your current house different from the furniture you had when you were young? Provide as many details as possible.", "사람들의 집에 있는 가구들은 지난 수년간 변화했습니다. 당신의 현재 집에 있는 가구가 당신이 어렸을때 있던 가구와 다른가요? 그것에 대해 상세히 이야기해 주세요.", "비교", "IM3"], ["I’d like to talk about any changes to furniture in your home in the last 10 years. Describe the differences between furniture in your home today and furniture in a home when you grew up.", "저는 지난 10년 동안 여러분의 집에 있는 가구에 어떤 변화가 있었는지에 대해 이야기하고 싶습니다. 오늘날 여러분의 집에 있는 가구와 여러분이 자랐을 때집에 있는 가구의 차이점을 설명해주세요.", "비교", "IM3"], ["Tell me about any electronic device that has undergone significant changes. What are the changes and what have they done in our lifestyles?", "최근 큰 변화를 겪은 가전제품에 대해 묘사해주세요. 변화는 무엇이고 우리의 생활에 어떤 영향을 끼쳤나요?", "이슈", "AL"], ["Could you describe how home appliances have influenced our lifestyle? How did technology incorporate into smart home appliances ? What changes have electronics or home appliances brought into our daily lives?", "가전제품이 어떻게 우리의 생활방식에 영향을 미쳤는지 설명해주실 수 있나요? 어떻게 기술이 스마트홈 제품에 결합이 되었나요? 전자제품이나 가전제품이 우리의 일상생활에 어떤변화를 가져왔나요?", "묘사", ""], ["I am going to give you a situation to act out. Imagine that you have gone to a store to buy new furniture. Ask the sales person three or four questions about the furniture you are looking for.", "당신이 새 가구를 사러 가게에 갔다고 상상해 보세요. 판매원에게 당신이 찾고 있는 가구에 대해 서너 가지질문을 하세요.", "RP", ""], ["I’m sorry, but you have a problem to resolve. The furniture you were planning to buy is no more available. Explain the sales clerk why you need the furniture, and give 2 or 3 suggestions to resolve the problem.", "죄송하지만 해결해야 할 문제가 있습니다. 구매하려던 가구는 더 이상 구매할 수 없습니다. 판매원에게가구가 필요한 이유를 설명하고 문제 해결을 위해2~3가지 제안을 하세요.", "RP", ""], ["I’m sorry, but there is a problem I need you to resolve. You have received the furniture you bought, but there is something wrong with the furniture. Call the furniture store, explain the situation, and ask for a way to get an exchange or a refund.", "죄송하지만 해결해야 할 문제가 있습니다. 구매하신가구는 받으셨지만 가구에 이상이 있습니다. 가구 매장에 전화해서 상황을 설명하고 교환이나 환불을 받을 수 있는 방법을 문의해 보세요.", "RP", ""], ["I’d like to give you a situation to act out. You would like to buy a MP3 player. Call your friend and ask about the MP3 player he or she is using. Ask 3 or 4 questions that will help you decide whether you want to buy the MP3 player your friend is using.", "당신은 MP3 플레이어를 사고 싶습니다. 당신의 친구에게 전화해서 그 혹은 그녀가 사용하고 있는 MP3플레이어에 대해 물어보세요. 당신이 당신의 친구가사용하고 있는 MP3 플레이어를 사고 싶은지 아닌지결정하는 데 도움이 될 3, 4개의 질문을 하세요.", "RP", ""], ["I’d like to give you a situation to act out. Suppose that you are going to borrow an MP3 player from your friend. Explain why you need it and ask your friend 3 or 4 questions about the MP3 player.", "당신이 친구에게 MP3 플레이어를 빌린다고 가정해보세요. 왜 그것이 필요한지 설명하고 친구에게 MP3플레이어에 대해 3, 4가지 질문을 하세요.", "RP", ""], ["I’m sorry, but you have a problem to resolve. You accidentally broke your friend’s MP3 player. Explain the situation to your friend and give 2 or 3 suggestions to resolve the problem.", "죄송하지만 해결해야 할 문제가 있습니다. 실수로 친구의 MP3 플레이어가 고장났습니다. 친구에게 상황을 설명하고 2~3가지 제안을 하면 문제가 해결됩니다.", "RP", ""]]}, {"ch": "CH6", "title": "공원·해변·캠핑·카페", "q": [["You indicated in the survey that you like to go to the park. Describe your favorite park in as much detail as possible. What makes it so special?", "당신은 설문에서 공원에 가는 것을 좋아한다고 했습니다. 당신이 가장 좋아하는 공원에 대해 가능한 한상세히 묘사해 주세요. 무엇 때문에 그곳이 그렇게 특별한가요?", "묘사", ""], ["In your background survey, you mentioned that you like going to parks. Please tell me about the park you like to go to. Where is it located, and what does it look like? What makes it special?", "배경 설문에서, 당신은 공원 가기를 좋아한다고 했습니다. 당신이 가기 좋아하는 공원에 대해 이야기해 주세요. 어디에 위치해 있고, 어떻게 생겼나요? 무엇이그곳을 특별하게 만드나요?", "묘사", ""], ["Tell me about what you usually do at the park. What is a typical day at the park like from beginning to end?", "당신이 주로 공원에서 무엇을 하는지에 대해 이야기해 주세요. 시작부터 끝까지 공원에서의 전형적인 하루는 어떤가요?", "묘사", ""], ["What kind of activities do you usually do at the park? Do you take walks or exercise at the park? Do you prefer to go there with others, or do you prefer to go alone? Please describe a typical day at the park.", "당신은 공원에서 주로 어떤 활동을 하나요? 산책을하나요, 아니면 운동을 하나요? 다른 사람들과 같이가는 것과 혼자 가는 것 중 어떤 것을 선호하나요? 공원에서의 일반적인 하루를 설명해 주세요.", "묘사", ""], ["How often do you go to the park? Who do you usually go with? What do you like to do? Tell me in as much detail as possible.", "당신은 얼마나 자주 공원에 가나요? 주로 누구와 함께 가나요? 무슨 일을 하기 좋아하나요? 가능한 한상세히 이야기해 주세요.", "묘사", ""], ["I’d like to give you a situation to act out. You have made plans with your friend to go to a local park. Call your friend and ask them 3 or 4 questions about your plans.", "상황을 줄테니 연기해 보세요. 당신은 동네 공원에 가기 위해 친구와 계획을 세웠습니다. 친구에게 전화해서 계획에 대해 서너 가지 질문을 하세요.", "RP", ""], ["I’m sorry, but a problem has come up at the last minute. Now, you won't be able to meet your friend at the park. Call your friend and explain your situation. Tell your friend why you can’t make it in detail. Give your friend one or two alternatives for what you can do.", "안타깝게도, 마지막 순간에 문제가 생겼습니다. 이제,당신은 공원에서 친구를 만날 수 없게 되었습니다. 친구에게 전화해서 당신의 상황을 설명하세요. 당신이왜 그것을 할 수 없는지 친구에게 자세히 말하세요. 한 두 가지 대안을 제시하세요.", "RP", ""], ["I’m sorry, but a problem has come up at the last minute. Your friend asked you to pick him or her up within an hour, but you won't be able to go because of your schedule conflict. Explain the situation and give solutions.", "안타깝게도, 마지막 순간에 문제가 생겼습니다. 당신의 친구가 한 시간 안에 데리러 오라고 요청했는데,일정때문에 갈 수 없게 되었습니다. 상황을 설명하고한 두가지 대안을 제시하세요.", "RP", ""], ["Please tell me about something interesting or memorable that has happened at a park. When was it? What were you doing? Who were you with? Please describe why it was so memorable in detail.", "공원에서 생긴 흥미롭거나 기억에 남는 일에 대해 이야기해 주세요. 언제였나요? 당신은 무엇을 하고 있었나요? 누구와 함께 있었나요? 왜 그 일이 기억에남는지 상세히 설명해 주세요.", "경험", ""], ["Please tell me about a time something interesting or unexpected happened at the park. Where and when did it occur? What were you doing at the time?", "공원에서 재미있거나 예상치 못했던 일이 있었던 때에 대해 이야기해 주세요. 어디에서 그리고 언제 그일이 일어났나요? 그때 당신은 무엇을 하고 있었나요?", "경험", ""], ["Please tell me about the activities people do at a park you often visit. What sorts of things do children do? How are they similar to or different from what adults do? Give me as many details as possible.", "당신이 자주 방문하는 공원에서 사람들이 하는 활동에 대해 이야기해 주세요. 아이들은 어떤 일을 하나요? 그것은 어른들이 하는 일과 어떻게 같거나 다른가요? 되도록 상세히 설명해 주세요.", "묘사", ""], ["There have been recent changes in parks today. What are the differences between the park you used to go in the past and the park nowadays?", "오늘날 공원에는 많은 변화가 있습니다. 과거에 가던공원과 오늘날 공원에는 어떤 차이점이 있나요?", "비교", "IH"], ["I’d like to know the main issue related to public parks today. What is the biggest problem that users of public parks face? What needs to be done to solve this problem? Tell me about it in detail.", "요즘 공원에 관련된 주요 이슈에 대해서 알고 싶어요. 공원 이용자들이 직면하는 가장 큰 문제점은 무엇인가요? 이 문제를 해결하기 위해 무엇이 필요할까요? 그것에 대해 상세히 이야기해 주세요.", "이슈", "AL"], ["In your background survey, you indicated that you like going to beaches. Where is your favorite beach and how often do you go there? Why do you like it?", "배경 설문에서, 당신은 해변에 가는 것을 좋아한다고했습니다. 당신이 가장 좋아하는 해변은 어디이고 그곳에 얼마나 자주 가나요? 왜 그곳을 좋아하나요", "묘사", ""], ["You indicated in your background survey that you like going to beaches. Tell me about your favorite beach. Where is it, and what does it look like? Why do you like it there so much?", "배경 설문에서, 당신은 해변에 가는 것을 좋아한다고했습니다. 가장 좋아하는 해변에 대해 이야기해 주세요. 어디에 있고, 어떻게생겼나요? 왜 그렇게 그곳을 좋아하나요?", "묘사", ""], ["You indicated in your background survey that you like going to beaches. Tell me about your preferences. Do you prefer tranquil and secluded beaches, or do you prefer bustling and crowded beach?", "배경 설문에서, 당신은 해변에 가는 것을 좋아한다고했습니다. 당신의 선호에 대해 얘기해주세요. 조용하고 외진 바다를 좋아하나요, 혹은 활발하고 사람이 많이 붐비는 바다를 좋아하나요?", "묘사", ""], ["Tell me about a memorable experience you have had at the beach. When was it? What happened? Who were you with? Explain what happened in detail to make it unforgettable.", "당신이 해변에서 겪었던 특별한 경험에 대해 이야기해 주세요. 언제였나요? 무슨 일이 있었나요? 누구와함께였나요? 어떤 일이 그 경험을 잊지 못하게 만들었는지 상세히 설명해 주세요.", "경험", ""], ["What items do you pack for a beach trip? Why do you take them with you? Provide as many details as possible.", "해변으로 여행을 갈 때 어떤 물건을 싸 가나요? 왜 그물건을 가져가나요? 되도록 상세한 내용을 많이 제시하세요.", "RP", ""], ["What do you usually do when you go camping? Please tell me everything you do on a camping trip.", "캠핑 여행을 갈 때 당신은 주로 무엇을 하나요? 캠핑여행 중에 당신이 하는 모든 일을 말해주세요.", "묘사", ""], ["In your background survey, you indicated that you like going camping. How often do you go camping, and what time of the year do you typically go? Who do you usually go with? What do you like to do on camping trips?", "배경 설문에서, 당신은 캠핑 가는 것을 좋아한다고 했습니다. 얼마나 자주 캠핑을 가고, 보통 일 년 중 언제캠핑을 가나요? 주로 누구와 함께 가나요? 캠핑을 가서 어떤 일을 하기 좋아하나요?", "묘사", ""], ["When was the last time you went camping? Where did you go? Who did you go with? Describe what you did on your camping trip in as much detail as you can.", "당신이 마지막으로 캠핑을 갔던 것은 언제인가요? 어디로 갔나요? 누구와 함께 갔나요? 캠핑을 가서 무엇을 했는지 되도록 상세히 설명해 주세요.", "경험", ""], ["What sort of gear do you bring along when you go camping? Do you prefer to take large items like tables and chairs or just smaller things like sleeping bags? Please describe the items you bring in detail, and explain what you use them for.", "당신은 캠핑을 갈 때 어떤 종류의 장비를 가져가나요? 테이블과 의자같이 큰 도구를 가져가는 것과 침낭같이 작은 도구만 가져가는 것 중 어느 쪽을 더 선호하나요? 가져가는 도구를 상세히 설명하고 그 도구들을 어디에 쓰는지 설명해 주세요.", "묘사", ""], ["I’m going to give you a situation to act out. Suppose that you are going to a camping shop to rent some camping gear for your next camping trip with your friends. Ask the clerk 3 or 4 questions about the camping gear you would like to rent.", "상황을 줄테니 연기해보세요. 친구들과의 캠핑을 위해 캠핑용품점에 가서 캠핑 장비를 빌립니다. 빌리고자 하는 캠핑 장비에 대해 질문을 서너개 해보세요.", "RP", ""], ["I’m sorry, but there’s a problem I need you to resolve. Upon receiving the camping gear, you noticed that there’s an issue with the camping gear. Call the camping shop, explain the situation and ask for a way to get an exchange or a refund.", "해결해야 할 문제가 있습니다. 캠핑 용품을 받았는데,문제가 있는 것을 발견했습니다. 캠핑용품점에 전화하여, 문제 상황을 설명한 후, 교환이나 환불을 요청해보세요.", "RP", ""], ["You indicated in your background survey that you like going to coffee shops. Please tell me about the coffee shop you frequently visit. Where is it, and why do you like to visit there? How do you usually spend time at your favorite coffee shop?", "배경 설문에서 ,당신은 카페에 가는 것을 좋아한다고했습니다. 자주가는 카페에 대해 얘기해주세요. 어디에 있고 왜 좋아하나요? 카페에서 보통 시간을 어떻게 보내나요?", "묘사", ""], ["Compare the coffee shop you frequently go to and other coffee shops in your country. Tell me about the similarities and differences between the coffee shops you like to go and other coffee shops. What is so special about your regular coffee shop?", "당신이 가는 카페와 다른 카페를 비교해주세요. 비슷한 점과 차이점에 대해 얘기해주세요. 당신이 가는 카페는 어떤 특별한 점이 있나요?", "비교", "IH"], ["Take me back to when you first went to a coffee shop. Did you have any problems at the coffee shop? Perhaps you got the wrong order or met someone unexpectedly at a coffee shop. Please tell me in detail.", "처음 카페에 가봤던 경험에 대해 얘기해주세요. 문제가 생겼던 적이 있나요? 주문을 잘못 받았거나 누군가를 만났던 경험과 같은 거에 대해 얘기해주세요.", "경험", ""]]}, {"ch": "CH7", "title": "음악·영화", "q": [["In your background survey, you indicated that you like to see movies. What kind of movies do you enjoy watching? Why do you like to watch those kinds of movies? Tell me about these movies in as much detail as possible.", "배경 설문에서, 당신은 영화 관람을 좋아한다고 했습니다. 어떤 종류의 영화를 보기 좋아하나요? 왜 그런종류의 영화를 좋아하나요? 그 영화들에 대해 되도록상세히 이야기해 주세요.", "묘사", ""], ["In your background survey, you indicated that you enjoy watching movies. What is your favorite type of movie and why? Please provide as many details as possible.", "배경 설문에서, 당신은 영화를 보는 것을 즐긴다고 했습니다. 가장 좋아하는 영화 종류는 무엇이고 왜 좋아하나요? 되도록 상세한 내용을 많이제시해 주세요.", "묘사", ""], ["Who is your favorite actor? What movies has this actor starred in? What do you like about him or her?", "가장 좋아하는 배우는 누구인가요? 그 배우가 어떤영화에 출연했나요? 당신은 그 배우의 어떤 점을 좋아하나요?", "묘사", ""], ["I’d like you to tell me about your favorite actor. Who is the actor? What movies has he or she starred in? What do you like most about him or her? Please tell me about the actor in as much detail as possible.", "당신이 가장 좋아하는 배우에 대해 알고 싶어요. 누구인가요? 그 배우가 어떤 영화에 출연했나요? 그 배우의 어떤 점을 가장 좋아하나요? 그 배우에 대해 되도록 상세히 이야기해 주세요.", "묘사", ""], ["What is your routine when you go to the theater? What do you do before watching movies? What about after? Please describe your routine in detail.", "당신이 극장에 갈 때 늘 하는 일상적인 일은 무엇인가요? 영화를 보기 전에 무엇을 하나요? 영화를 본 후에는 어떤가요? 당신의 일상에 대해 상세히 묘사해주세요.", "묘사", ""], ["I’d like to give you a situation and act it out. One of your friends has told you about a new movie that sounds interesting. Ask your friend 3 or 4 questions about the movie.", "상황을 줄테니 연기해보세요. 당신의 친구 중 한 명이당신에게 재밌을 것 같은 새 영화에 대해 말했습니다. 친구에게 영화에 대해 서너 가지 질문을 하세요.", "RP", ""], ["I’m sorry, but there’s a problem I need you to resolve. You and your friend are in the middle of watching the movie at the theater. However, you want to leave because it is so boring. Explain the whole situation to your friend and suggest 2 or 3 alternatives.", "해결해야 할 문제가 있습니다. 당신과 당신의 친구는극장에서 영화를 보는 중입니다. 하지만 당신은 너무지루해서 떠나고 싶어합니다. 당신의 친구에게 전체상황을 설명하고 2~3가지 대안을 제안하세요.", "RP", ""], ["That’s the end of the situation. Have you ever been in a similar situation? Have you wanted to leave the theater because the movie was so boring? If so, tell me about it. What did you do? Did you decide to stay, or did you go? How did you feel? Tell me as much as you can.", "상황은 여기까지입니다. 혹 비슷한 상황에 처했던 적이 있나요? 영화가 너무 지루해서 극장을 떠나고 싶었던 적이 있나요? 만약 그렇다면, 그것에 대해 말해보세요. 무엇을 했나요? 남기로 했나요, 아니면 갔나요? 기분이 어땠나요? 최대한 말해보세요.", "경험", ""], ["Talk about a movie you remember best. What was it about? Who was in it? How did you feel when watching it?", "가장 기억에 남는 영화에 대해 이야기해 주세요. 무엇에 관한 영화였나요? 누가 그 영화에 출연했나요? 그영화를 보면서 어떤 느낌이 들었나요?", "경험", ""], ["Please tell me about the most memorable movie you have seen. What was the movie about? Who was in it? Why was it memorable?", "당신이 본 영화 중 가장 기억에 남는 영화에 대해 이야기해 주세요. 무엇에 관한 영화였나요? 누가 출연했나요? 왜 그 영화가 기억에 남나요?", "경험", ""], ["Has your taste in movies changed over time? Tell me about the changes in your tastes in movies over the past few years. How are the movies you enjoy now different from those in the past? Please explain in as much detail as possible.", "당신의 영화 취향이 시간이 지나면서 변했나요? 지난몇 년간 당신의 영화 취향의 변화에 대해 이야기해 주세요. 현재 당신이 즐기는 영화들은 과거에 즐겼던 영화들에 비해 어떻게 다른가요? 되도록 상세히 설명해주세요.", "비교", "IH"], ["I’d like to know about a major issue or concern affecting the movie industry these days. What is the issue? How is it affecting the lives of people? What needs to be done to address this issue? Please explain in detail.", "요즘 영화산업에 영향을 미치는 주요 이슈나 우려에대해서 알고 싶어요. 무엇이 이슈인가요? 그것이 사람들에게 어떤 영향을 주고 있나요? 이 이슈에 대처하기 위해 무엇이 필요할까요? 상세히 설명해 주세요.", "이슈", "AL"], ["In your background survey, you indicated that you enjoy listening to music. What kind of music do you like? Who is your favorite singer or composer?", "배경 설문에서, 당신은 음악 감상을 즐긴다고 했습니다. 당신은 어떤 종류의 음악을 좋아하나요? 당신이가장 좋아하는 가수 또는 작곡가는 누구인가요?", "묘사", ""], ["Tell me about your favorite musician or singer. What kind of songs does he or she sing? Why do you like him or her? Describe him or her in as much detail as possible.", "당신이 가장 좋아하는 음악가나 가수에 대해서 이야기해 주세요. 그 가수가 어떤 종류의 노래를 부르나요? 당신은 그 가수를 왜 좋아하나요? 그 가수에 대해 되도록 상세히 설명해 주세요.", "묘사", ""], ["In your background survey, you indicated that you enjoy listening to music. What kind of music do you like? Why do you like it? When and where do you usually listen to music? How do you listen to music?", "배경 설문에서, 당신은 음악 감상하기를 좋아한다고했습니다. 어떤 종류의 음악을 좋아하나요? 왜 그 음악을 좋아하나요? 언제 그리고 어디서 주로 음악을감상하나요? 어떤 방법으로 음악을 감상하나요?", "묘사", ""], ["Where and when do you usually listen to music? What do you use to listen to music? Provide as many details as possible in your response.", "당신은 어디에서 그리고 언제 주로 음악을 듣나요? 음악을 듣기 위해 무엇을 사용하나요? 답변에 되도록상세한 내용을 많이 제시하세요.", "RP", ""], ["What first interested you in music? When you first heard your favorite singer or composer, how did you feel? Has your taste in music changed at all?", "처음 음악에 관심을 갖게 한 것이 무엇이었나요? 당신이 가장 좋아하는 가수 혹은 작곡가의 노래를 처음들었을 때, 기분이 어땠나요? 당신의 음악적 취향은조금이라도 변했나요?", "비교", "IH"], ["What is your favorite song? What makes it so special? Do you have a special memory associated with the song?", "당신이 가장 좋아하는 노래는 무엇인가요? 무엇 때문에 그 노래가 그렇게 특별한가요? 그 노래와 관련된특별한 추억이 있나요?", "묘사", ""], ["Tell me about the most memorable experience you have had while listening to music. When was it? Where did it happen? What made the experience so memorable? Please describe it in as much detail as possible.", "음악 감상 도중 겪었던 기억에 남는 경험에 대해 이야기해 주세요. 언제였나요? 어디서 그 일이 일어났나요? 왜 그 일이 기억에 남나요? 그것에 대해 되도록상세히 설명해 주세요.", "경험", ""], ["Tell me about a time when you went to listen to some live music. Perhaps it was at a concert or a live cafe. What was the mood like and how did you like the music you listened to there?", "라이브 음악을 들으러 갔던 때에 대해 말해보세요. 콘서트나 라이브 카페에서 같은 거요. 분위기는 어땠고거기서 들은 음악은 어땠나요?", "경험", ""], ["I would like you to choose two genres of music you like and compare them. What are the differences between them? How do you feel when you listen to each type of music? Provide as many details as possible.", "당신이 좋아하는 음악 장르를 두 가지 골라서 그 둘을비교해 보세요. 그들 간에 차이점은 무엇인가요? 각종류의 음악을 들을 때 당신은 어떤 기분이 드나요? 되도록 상세히 설명해 주세요.", "비교", "IH"], ["What kind of devices do people like to listen to music on? Can you tell me about the popular ones? Why do people like them? Please explain about the devices in as much detail as possible.", "사람들은 어떤 종류의 기기로 음악을 듣기 좋아하나요? 인기 있는 기기들에 대해 이야기해 줄 수 있나요? 사람들이 그것들을 왜 좋아하나요? 기기들에 대해서 되도록 상세히 설명해 주세요.", "묘사", ""], ["Compare the device people use to listen to music between the past and nowadays. How is it different? What device did people use and what do people use now? Provide as many details as possible in differences.", "사람들이 과거와 오늘날에 쓰는 음악을 듣는 장비를비교해 보세요. 어떻게 다른가요? 사람들이 과거에는어떤 장비를 썼고 지금은 어떤걸 사용하나요? 차이점에 있어 최대한 자세히 얘기해보세요.", "비교", "IH"], ["I’d like to give you a situation to act out. Imagine that you are planning to buy tickets for a concert to go with your friend. Call the theater and ask 2 or 3 questions about ways to get tickets.", "상황을 줄테니 연기해보세요. 친구와 함께 갈 콘서트티켓을 구매할 계획이라고 상상해 보세요. 극장에 전화해서 티켓을 구매하는 방법에 대해 두세 가지 질문을 하세요.", "RP", ""], ["I’m sorry, but there is a problem I need you to resolve. You have already bought the concert tickets, but a problem has come up. Call your friend, explain your situation, and give your friend 2 or 3 suggestions.", "죄송하지만 해결해야 할 문제가 있습니다. 이미 콘서트 티켓을 구매하셨는데 문제가 생겼습니다. 친구에게 전화해서 상황을 설명하고 친구에게 2~3가지 제안을 하세요.", "RP", ""], ["I’m sorry, but there is a problem I need you to resolve. The tickets you wanted to purchase are already sold out. Call your friend and give 2 or 3 solutions.", "죄송하지만 해결해야 할 문제가 있습니다. 구매하고자 하는 티켓이 품절입니다. 친구에게 전화해서 2~3가지 제안을 하세요.", "RP", ""]]}, {"ch": "CH8", "title": "음식·외식", "q": [["Is there a particular restaurant you often go to? What kind of food does it serve? Why do you like to go there?", "당신이 자주 가는 특정 식당이 있나요? 그 식당은 어떤 종류의 음식을 제공하나요? 당신은 왜 그곳에 가는 것을 좋아하나요?", "묘사", ""], ["I would like to know about a restaurant you often visit. What kind of dishes does it serve? What do you like about the restaurant? What does it look like?", "당신이 자주 방문하는 식당에 대해서 알고 싶어요. 그곳은 어떤 종류의 음식을 파나요? 당신이 그 식당에대해 좋아하는 점은 무엇인가요? 그곳은 어떻게 생겼나요?", "묘사", ""], ["What was the last restaurant you ate at? What did you have there? Who did you go with? Provide as many details in your response as possible.", "마지막으로 식사한 식당이 어디였나요? 당신은 그곳에서 무엇을 먹었나요? 누구와 함께 갔나요? 되도록답변에 자세한 내용을 많이 제시하세요.", "RP", ""], ["Tell me about one of the healthy foods you had recently. What was it? What was special about that food? Provide as many details in your response as possible.", "최근에 먹은 건강한 음식에 대해 얘기해주세요. 무엇이었나요? 어떤 점이 특별했나요? 최대한 자세히 이야기해주세요.", "경험", ""], ["Have you ever had a special experience at a restaurant? Who were you with? What happened? Tell me about the experience in detail, and explain what made it memorable.", "당신은 식당에서 특별한 경험을 한 적이 있나요? 누구와 함께 있었나요? 무슨 일이 있었나요? 그 경험에대해 상세히 말해 보고, 무엇이 그 경험을 기억에 남게 만들었는지 이야기해 주세요.", "경험", ""], ["Many countries have special or unique foods. What are some of the traditional dishes in your country? Please describe them in detail.", "많은 나라들이 특별하거나 고유한 음식을 가지고 있습니다. 당신의 나라에는 어떤 전통 음식들이 있나요? 그것들에 대해서 상세히 묘사해 주세요.", "묘사", ""], ["Tell me about the most famous dish of your country. What are the main ingredients in it? Do you know how to make it? What is special about the dish?", "당신 나라에서 가장 유명한 요리에 대해 이야기해 주세요. 거기에 들어가는 주재료는 무엇인가요? 어떻게만드는지 아나요? 그 요리의 특별한 점은 무엇인가요?", "묘사", ""], ["More and more people are into healthy eating nowadays. Tell me about one of the healthy food that is popular in your country. What are the main ingredients in it? Do you know how to make it? What is special about the dish?", "점점 많은 사람들이 건강한 식단에 관심이 많아지고있습니다. 당신의 나라에서 인기가 많은 건강한 음식에 대해 묘사해주세요. 거기에 들어가는 주재료는 무엇인가요? 어떻게 만드는지 아나요? 그 요리의 특별한 점은 무엇인가요?", "묘사", ""], ["Have you ever experienced food poisoning or heard of it? When was it? What food caused it? Tell me about your experiences or thoughts related to food poisoning.", "당신은 식중독을 겪어보거나 식중독에 대해 들어본적이 있나요? 언제였나요? 어떤 음식이 원인이 되었나요? 식중독에 관련된 경험이나 생각을 말해보세요.", "경험", ""], ["Tell me about where and when you go grocery shopping. Has it changed from the past to now? If so, what are the changes in grocery shopping?", "장 보는 방식에 대해 얘기해주세요. 과거로부터 바뀐것이 있나요? 그렇다면, 어떤 점이 바뀌었나요?", "비교", "IH"], ["There are a growing variety of foods in the world. There are healthy foods, but there are foods that people are concerned about. Please tell me about the fake food that people are talking about. What are some of the concerns people have about fake food? And what are some of its negative effects?", "세상에는 점점 다양한 음식이 생기고 있습니다. 건강한 음식도 있지만, 사람들이 염려하는 음식도 있습니다. 사람들이 얘기하는 가짜 음식에 대해 얘기해주세요. 가짜 음식에 대해 사람들이 염려하는 점은 무엇인가요? 그리고 그것의 부정적인 영향에는 어떤 것들이있나요?", "묘사", ""], ["Have you experienced or heard about contaminated food or food bacteria? What concerns do people have about food bacteria? Why do those problems occur and how can they be solved?", "오염된 음식이나 음식 박테리아에 대해 들어보거나겪어본적이 있나요? 사람들은 박테리아에 대해 어떤염려점을 가지나요? 그런 오염된 음식에 관한 원인과해결책은 어떻게 될까요?", "이슈", "AL"], ["I am going to give you a situation to act out. You want to go to a restaurant next week with your friends. Call the restaurant and make a reservation for you and your friends.", "상황을 줄테니 연기해 보세요. 다음 주에 친구들과 식당에 가려고 합니다. 식당에 전화해서 당신과 친구들을 위해 예약을 하세요.", "RP", ""], ["I'd like to give you a situation and want you to act it out. You are just invited to a dinner party at a restaurant. Call your friend and ask 3 or 4 questions about the restaurant and the party.", "상황을 줄테니 연기해 보세요. 친구가 저녁 식사 자리에 초대를 해주었습니다. 식당과 식사 자리에 대해 질문을 세네가지 해보세요.", "RP", ""], ["I'm sorry, but there is a problem I need you to resolve. You found out that the date you wanted to book a table is not available. Tell the server why you want to make a reservation, then give 2 or 3 suggestions.", "죄송하지만 해결해 주셔야 할 문제가 있습니다. 예약하려는 날짜가 비어있는 것을 알게 되셨습니다. 직원에게 예약하려는 이유를 말한 다음 2~3개의 제안을하세요.", "RP", ""], ["I'm sorry, but there is a problem I need you to resolve. While having dinner, you found out that there's something wrong with the food you ordered. Explain the situation to the server, and ask for a refund.", "죄송하지만 해결해야 할 문제가 있습니다. 저녁을 먹다가 주문하신 음식에 이상이 있다는 것을 알게 되었습니다. 직원에게 상황을 설명하시고, 환불을 요청하세요.", "RP", ""], ["Imagine you work at a restaurant. You were told that one of the dishes customers ordered has a problem. Explain the situation to the manager, and give solutions.", "식당에 취업을 했다고 상상해보세요. 손님이 주문한음식에 문제가 있다는 것을 알게 되었습니다. 상사에게 상황을 설명하고, 대안책을 제시해보세요.", "RP", ""], ["I'm sorry, but there is a problem I need you to resolve. You found out that the dish was different from what you had ordered. Explain the situation to the server, and ask 2 or 3 solutions.", "죄송하지만 해결해야 할 문제가 있습니다. 음식이 주문한 것과 다르다는 것을 발견했습니다. 서버에 상황을 설명하고, 2~3개의 해결책을 물어보세요.", "RP", ""], ["I'd like to give you a situation and ask you to act it out. You're planning to go to the restaurant this weekend with your friends. Call the restaurant and book a table for you and your friends.", "상황을 줄테니 연기해 보세요. 이번 주말에 친구들과레스토랑에 가려고 합니다. 레스토랑에 전화해서 친구들과 테이블을 예약해주세요.", "RP", ""], ["I'm sorry, but there is a problem I need you to resolve. You already made a reservation for dinner, however, you are not available on the day you're supposed to meet your friend. Call your friend, explain your situation, and suggest 2 or 3 alternatives.", "죄송하지만 해결해야 할 문제가 있습니다. 이미 저녁식사 예약을 했지만 친구를 만나기로 한 날에 당신이만날 수 없게 되었습니다. 친구에게 전화해서 상황을설명하고 2~3가지 대안을 제안해 보세요.", "RP", ""], ["I'm sorry, but there is a problem I need you to resolve. You found out that the date you wanted to book a table is not available. Call your friend, explain the situation, and suggest 2 or 3 alternatives.", "죄송하지만 해결해야 할 문제가 있습니다. 당신이 테이블 예약을 원하는 날짜가 예약이 불가합니다. 친구에게 전화해서 상황을 설명하고 2~3가지 대안을 제시해주세요.", "RP", ""]]}, {"ch": "CH9", "title": "집안일", "q": [["Everyone has to do housework on a regular basis. What kind of chores do you usually do at home? Tell me about them in detail.", "모든 사람은 정기적으로 집안일을 해야 합니다. 당신은 집에서 주로 어떤 종류의 집안일을 하나요? 그것들에 대해 상세히 이야기해 주세요.", "묘사", ""], ["Tell me about the house chore you don’t like to do the most. What makes the house chore hard to handle?", "당신이 가장 하기 싫어하는 집안일에 대해 얘기해주세요. 왜 그 집안일은 하기 어렵나요?", "묘사", ""], ["You and your family probably have different responsibilities at home. Tell me about which chores each family member is responsible for.", "당신과 당신 가족들은 아마도 집에서 서로 다른 일들을 맡고 있을 거예요. 각 가족 구성원이 어떤 집안일을 담당하고 있는지에 대해 이야기해 주세요.", "묘사", ""], ["How are the responsibilities divided among family members in your household? What tasks do you usually do? Which ones do the others do? Is this system fair, or do you think it should be changed?", "당신 집에서 집안일은 가족 간에 어떻게 나누어져 있나요? 당신은 주로 어떤 집안일을 하나요? 다른 가족들은 어떤 집안일을 하나요? 이 방식이 공정한가요,아니면 달라져야 한다고 생각하나요?", "묘사", ""], ["Have you ever had chores that you weren’t able to do? If so, explain why you weren’t able to do them. Tell me using as many details as possible.", "당신이 할 수 없었던 집안일이 있었던 적이 있나요? 만약 그렇다면, 당신이 왜 그것을 할 수 없었는지 설명해 주세요. 되도록 상세한 내용을 많이 사용해서 이야기하세요.", "경험", ""], ["Did you ever get in trouble for not fulfilling your household responsibilities as a child? When did it happen? What were you supposed to do? Please tell me about what happened and how you handled it in as much detail as possible.", "당신은 어렸을 때 맡은 집안일을 하지 않아서 곤경에처했던 적이 있나요? 언제였나요? 원래 무엇을 했어야 했나요? 어떤 일이 있었고, 당신이 그 일을 어떻게해결했는지 되도록 상세히 이야기해 주세요.", "경험", ""], ["Please talk about something interesting or special that has happened while doing housework. When did it happen? What sort of housework were you doing? Give me as many details as possible.", "당신이 집안일을 하는 도중 겪은 흥미롭거나 특별한경험에 대해 이야기해 주세요. 언제 그 일이 일어났나요? 어떤 종류의 집안일을 하고 있었나요? 되도록 상세히 설명해 주세요.", "경험", ""], ["How has the way people do house chores changed from the past to now? Tell me how it was in the past and how it is now. What are the significant changes?", "사람들이 집안일을 하는 방식이 과거에서 현재 어떻게 바뀌었나요? 옛날에는 어땠고 지금은 어떤지 얘기해주세요. 가장 큰 변화는 어떤건가요?", "비교", "IH-AL"], ["I’d like to give you a situation and ask you to act it out. Imagine that a family member asks you to take care of his or her plants while he or she is away. Ask 3 or 4 questions to find out what you need to do.", "가족 구성원이 여러분이 자리를 비운 동안 식물을 보살펴 달라고 부탁한다고 상상해 보세요. 여러분이 해야 할 일이 무엇인지 알아내기 위해 3~4개의 질문을하세요.", "RP", ""], ["I am sorry but there’s a problem you need to resolve. While your family member is gone, you noticed that there’s a problem with one of his or her plants. Call your family member, explain in detail what happened to the plant, and make 2 or 3 suggestions to resolve the problem.", "가족이 없는 동안, 식물에 문제가 있다는 것을 알게되셨습니다. 가족에게 전화를 걸어 식물에 무슨 일이일어났는지 자세히 설명하고, 문제를 해결하기 위해두세 가지 제안을 하세요.", "RP", ""], ["I’d like to give you a situation and ask you to act it out. Imagine that a family member asks you to take care of your nephew or niece. Ask 3 or 4 questions to find out what you need to do.", "가족 구성원이 여러분이 자리를 비운 동안 아이를 보살펴 달라고 부탁한다고 상상해 보세요. 여러분이 해야 할 일이 무엇인지 알아내기 위해 3~4개의 질문을하세요.", "RP", ""], ["I am sorry but there’s a problem you need to resolve. While your family member is gone, you found that there’s a problem with your nephew or niece. Call your family member, explain in detail what happened, and ask what you should do.", "가족이 없는 동안, 아이에게 문제가 있다는 것을 알게되셨습니다. 가족에게 전화를 걸어 무슨 일이 일어났는지 자세히 설명하고, 무얼 해야 할지 물어보세요.", "RP", ""]]}, {"ch": "CH10", "title": "재활용", "q": [["How do you recycle at home? When and how often do you take out recyclable items? Describe the process in detail.", "당신은 집에서 어떻게 재활용을 하나요? 언제, 그리고 얼마나 자주 재활용품을 내놓나요? 그 과정을 상세히 묘사해 주세요.", "묘사", ""], ["How do you recycle at home? When and how often do you recycle? Describe each step of the process from beginning to end.", "당신은 집에서 어떻게 재활용을 하나요? 언제, 그리고 얼마나 자주 재활용을 하나요? 그 과정의 각 단계를 처음부터 끝까지 설명해 주세요.", "묘사", ""], ["Tell me about a memorable experience you have had while recycling. What happened and what did you do? Please describe the experience in detail.", "재활용을 하며 겪었던 기억에 남는 경험에 대해 이야기해 주세요. 무슨 일이 있었고, 당신은 무엇을 했나요? 그 경험에 대해 상세히 묘사해 주세요.", "경험", ""], ["How do the people in your country recycle? What items do they recycle? Tell me about the recycling system in your country in detail.", "당신의 나라의 사람들은 어떻게 재활용을 하나요? 어떤 물건을 재활용하나요? 당신의 나라의 재활용 시스템에 대해 상세히 이야기해 주세요.", "묘사", ""], ["Tell me about recycling in your country. What kind of items do people usually recycle? Please describe the recycling system in your country in detail.", "당신 나라의 재활용에 대해 이야기해 주세요. 사람들은 보통 어떤 종류의 물건을 재활용하나요? 당신 나라의 재활용 시스템을 상세히 설명해 주세요.", "묘사", ""], ["How is the recycling system different from other countries? What are the similarities and differences between the recycling system in your country and the one in other countres?", "당신 나라에서의 재활용은 다른 나라와 어떻게 다른가요? 어떤 비슷한 점과 다른 점들이 있나요?", "비교", "IH"], ["Imagine you are at a supermarket, and you notice someone throwing plastic bottles into the regular trash. Approach them and encourage them to recycle. How would you persuade them to use the recycling bin instead?", "여러분이 슈퍼마켓에 있고, 누군가가 플라스틱 병을일반 쓰레기통에 버리는 것을 발견했다고 상상해보세요. 그들에게 다가가 재활용을 독려하세요. 대신 재활용 쓰레기통을 사용하도록 어떻게 설득할 것인가요?", "RP", ""], ["I want you to give you a situation to act out. You recently moved to a new apartment and want to figure out about recycling. Ask a property manager 3 or 4 questions to find out the proper way of recycling.", "상황을 줄테니 연기해보세요. 당신은 최근에 새로운아파트에 이사를 해서 재활용에 대해 알고 싶습니다. 건물관리인에게 적절한 재활용 방법을 알기 위해 질문 3~4개를 해보세요.", "RP", ""], ["You are in a park, and you see people littering despite the presence of recycling bins. Approach someone and explain the importance of keeping public spaces clean and recycling properly. How would you encourage responsible behavior?", "여러분은 공원에 있고, 재활용 쓰레기통이 있음에도불구하고 사람들이 쓰레기를 버리는 것을 볼 수 있습니다. 누군가에게 다가가서 공공장소를 깨끗하게 유지하고 재활용하는 것의 중요성에 대해 설명하세요. 여러분은 어떻게 책임감 있는 행동을 장려할 것인가요?", "RP", ""], ["Imagine you work in an office where there is no recycling program. Talk to your supervisor about the importance of recycling and propose the implementation of a recycling program in the workplace.", "당신이 재활용이 없는 사무실에서 일하는 상황입니다. 상사와 재활용의 중요성에 대해 이야기하고 직장에서 재활용 프로그램의 시행을 제안해보세요.", "묘사", ""], ["Imagine your friend is not aware of the environmental impact of not recycling. Explain to them the benefits of recycling and encourage them to adopt more sustainable habits.", "당신의 친구가 재활용을 하지 않는 것의 환경적인 영향에 대해 모르고 있다고 상상해보세요. 그들에게 재활용의 장점을 설명하고 더 지속 가능한 습관을 갖도록 격려하세요", "RP", ""], ["Imagine you are a teacher in an elementary school. Discuss with a colleague how you would incorporate lessons about recycling into the curriculum. What activities and discussions would you plan to make the topic engaging for young students?", "여러분이 초등학교의 선생님이라고 상상해 보세요. 동료와 재활용에 관한 수업을 교육과정에 어떻게 포함시킬 것인지에 대해 논의하세요. 어린 학생들이 흥미를 느낄 수 있도록 어떤 활동과 토론을 계획하고 있나요?", "묘사", ""], ["Discuss with a family member about ways to reduce waste at home. How would you suggest implementing a successful recycling routine, and what specific steps could your family take to minimize their environmental footprint?", "가정 내 쓰레기를 줄이기 위한 방법에 대해 가족과 논의하세요. 성공적인 재활용 절차를 어떻게 이행할 것을 제안하고, 여러분의 가족이 환경 발자국을 최소화하기 위해 취할 수 있는 구체적인 조치는 무엇인가요?", "묘사", ""], ["Your family does not currently recycle at home. Initiate a family discussion about the importance of recycling and propose a plan to implement recycling practices within your household.", "당신의 가족은 현재 집에서 재활용을 하지 않습니다. 재활용의 중요성에 대한 가족 토론을 시작하고 가정내에서 재활용 관행을 시행하기 위한 계획을 제안합니다.", "묘사", ""], ["Imagine you are a journalist interviewing an environmental expert about recycling. Ask questions about the current state of recycling, challenges faced, and the potential benefits for the community.", "당신이 재활용에 대해 환경 전문가와 인터뷰를 하고있는 기자라고 상상해보세요. 현재 재활용의 상태, 직면한 과제, 그리고 지역 사회에 대한 잠재적인 이익에대해 질문을 하세요.", "RP", ""], ["You are part of a community group that aims to promote recycling. Discuss with a fellow member about organizing an event to raise awareness about the importance of recycling in your neighborhood. What ideas would you suggest, and how would you convince others to participate?", "당신은 재활용을 촉진하는 것을 목표로 하는 공동체그룹의 일부입니다. 당신의 이웃에서 재활용의 중요성에 대한 인식을 높이기 위해 행사를 조직하는 것에대해 동료 회원과 논의하세요. 당신은 어떤 아이디어를 제안하고, 당신은 다른 사람들이 참여하도록 어떻게 설득할 것인가요?", "RP", ""], ["You are attending a community meeting to discuss environmental issues. Express your concerns about the lack of recycling initiatives in your neighborhood. Convince others to join you in starting a community recycling program.", "당신은 환경 문제를 논의하기 위해 지역 사회 회의에참석하고 있습니다. 당신의 동네에서 재활용 정책이부족한 것에 대한 우려를 얘기해보세요. 다른 사람들이 지역 사회 재활용 프로그램을 시작하는 데 함께 하도록 설득하세요.", "RP", ""], ["Pretend you are a spokesperson for a city-wide recycling campaign. Speak to a group of citizens at a community event and inspire them to actively participate in recycling efforts to make the city more environmentally friendly.", "당신이 도시 전체의 재활용 캠페인의 대변인이라고연기해보세요. 지역 사회 행사에서 한 무리의 시민들과 이야기하고 그들이 도시를 더 환경 친화적으로 만들기 위한 재활용 노력에 적극적으로 참여하도록 격려하세요.", "RP", ""]]}, {"ch": "CH11", "title": "조깅·걷기·하이킹·자전거", "q": [["In your background survey, you mentioned that you like to jog. Do you have a specific place you like to go for jogging? Where is it located? Why do you go to this specific place? Provide me with as many details as possible.", "설문조사에서 조깅하는 것을 좋아한다고 언급했습니다. 특별히 조깅하러 좋아하는 장소가 있을까요? 어디에 위치해있나요? 왜 그 장소를 가기를 좋아하나요? 자세히 얘기해주세요.", "묘사", ""], ["When did you first become interested in jogging? Why did you start? Has your physical condition changed since you started jogging? How has it changed?", "언제 조깅에 관심을 갖게 되었나요? 왜 시작하게 되었나요? 조깅을 시작하고부터 신체적 변화가 있나요? 어떻게 변했나요?", "비교", "IH"], ["What items do you wear or bring when you go jogging? What do you usually do to take safety precautions from getting injuries?", "조깅을 갈 때 입거나 챙기는 것들이 있나요? 부상을예방하기 위해 어떤 예방조치를 취하나요?", "묘사", ""], ["In your background survey, you mentioned that you like to hike. Tell me about the mountain you like to go for a hike. Where is it located? What is special about this mountain? Provide me with as many details as possible.", "배경 조사에서 하이킹을 좋아한다고 언급했습니다. 하이킹을 가는 산에 대해 얘기해 주세요. 어디에 있나요? 이 산의 특별한 점은 무엇인가요? 가능한 한 많은 세부 정보를 얘기해 주세요.", "묘사", ""], ["How is the mountain you go different from other mountains in your country? Is there a difference from other mountains? Tell me in detail why you go hiking in the mountain.", "당신이 가는 산은 당신 나라의 다른 산들과 어떤 점이다른가요? 다른 산들과의 차이점이 있나요? 왜 그 산에 하이킹을 가는지 자세히 얘기해주세요.", "비교", "IH"], ["I’d like to give you a situation to act out. Your supervisor invited you to go for a hike with other coworkers. Ask your supervisor 3 or 4 questions about hiking plans.", "상황을 줄테니 연기해보세요. 당신의 상사가 하이킹에 가자고 초대를 했습니다. 하이킹 일정에 대해 서너가지 질문을 해보세요.", "RP", ""], ["I’m sorry, but a problem has come up at the last minute. One of your colleagues told you that he or she was running late and asked you to deliver his or her situation. Call the supervisor, explain the situation, and suggest solutions.", "해결해야할 문제가 있습니다. 당신의 동기 중 한 명이늦는다고 당신에게 전화를 하여, 상황을 전달해달라고 요청했습니다. 상사에게 전화하여 상황을 설명하고, 대안책을 제시해보세요.", "RP", ""], ["You indicated in the survey that you enjoy cycling. Describe a memorable experience you have had while cycling. When did it occur? Who were you with? What happened?", "당신은 설문에서 자전거 타는 것을 즐긴다고 했습니다. 자전거를 타던 중 있었던 기억에 남는 경험에 대해 묘사해 주세요. 언제 그 일이 일어났나요? 누구와함께 있었나요? 무슨 일이 있었나요?", "경험", ""], ["There are many different types of bicycles. Please describe your bicycle in detail. What does it look like? Where did you buy it?", "여러 가지 종류의 자전거가 많이 있습니다. 당신의 자전거를 상세히 묘사해 주세요. 자전거가 어떻게 생겼나요? 자전거를 어디에서 구입했나요?", "묘사", ""], ["Cycling is a very popular hobby. When do you enjoy riding your bicycle? Where do you usually go and with whom?", "자전거 타기는 매우 인기 있는 취미입니다. 당신은 언제 자전거를 즐겨 타나요? 주로 어디를 가고 누구와함께 가나요?", "묘사", ""], ["When do you usually ride your bicycle? Where do you go for a ride? How often do you ride it and with whom? How do you feel when you ride your bike?", "당신은 언제 주로 자전거를 타나요? 자전거를 타러어디로 가나요? 얼마나 자주 타고, 누구와 함께 타나요? 자전거를 탈 때 어떤 기분이 드나요?", "묘사", ""], ["How did you develop your interest in bike riding? Who taught you how to ride and how old were you? Provide as many details as possible.", "당신은 어떻게 자전거 타기에 대한 관심을 발전시켰나요? 누가 당신에게 자전거 타는 법을 가르쳐 주었고 당신은 몇 살이었나요? 되도록 상세한 내용을 많이 제시하세요.", "RP", ""], ["When did you start riding bicycles? Why did you start, and who taught you? Was it difficult to learn? Are you good at it now? How have you improved your riding skill?", "당신은 언제 자전거를 타기 시작했나요? 왜 시작했고, 당신을 가르쳐준 사람은 누구인가요? 배우기 어려웠나요? 지금은 잘 타나요? 어떻게 자전거 타는 실력을 키웠나요?", "비교", "IH"], ["I’d like to give you a situation and act it out. Let’s suppose you are planning to rent a bike. Call the bike rental company and ask the clerk 2 or 3 questions.", "상황을 줄테니 연기해보세요. 당신이 전거 대여를 계획하고 있다고 가정해 보겠습니다. 자전거 대여 업체에 전화해서 점원에게 2, 3가지 질문을 하세요.", "RP", ""], ["I’m sorry, but there’s a problem I need you to resolve. The bike rental company said they don’t have the particular bike that you’re trying to rent. I would like you to explain to the staff why you really need it and suggest 2 or 3 alternatives to this matter.", "죄송하지만 해결해야 할 문제가 있습니다. 자전거 대여 업체에서 대여하려는 특정 자전거가 없다고 합니다. 직원에게 왜 꼭 필요한지 설명해주시고 이 문제에 대해 2~3가지 대안을 제시해주셨으면 합니다.", "RP", ""], ["That’s the end of the situation. When was the last time you rented a bike? Why did you have to rent a bike? Where did you do it? Please tell me everything about renting a bike in detail.", "상황은 여기까지입니다. 마지막으로 자전거를 빌린게 언제입니까? 왜 굳이 자전거를 빌리셨어요? 어디서 하셨어요? 자전거 빌리는 것에 대한 모든 것을 자세히 알려주세요.", "경험", ""], ["Tell me about a memorable experience you have had while riding a bicycle. Where and when was it? Who were you with? Did something interesting or unexpected happen? What happened? Describe the experience in as much detail as you can.", "자전거를 타던 중 겪었던 기억에 남는 경험에 대해 이야기해 주세요. 언제 어디에서였나요? 누구와 함께있었나요? 흥미롭거나 예상치 못했던 일이 일어났나요? 어떤 일이 일어났나요? 그 경험에 대해 되도록 상세히 설명해 주세요.", "경험", ""]]}, {"ch": "CH12", "title": "여행·집휴가", "q": [["You indicated in the survey that you enjoy traveling within your home country. What are your favorite places to visit and why do you like them?", "당신은 설문에서 국내 여행을 하는 것을 즐긴다고 했습니다. 당신이 방문하기 가장 좋아하는 장소들은 어디이고 왜 그곳들을 좋아하나요?", "묘사", ""], ["In your background survey, you indicated that you enjoy domestic travel. Where do you like to visit? Which do you prefer, mountains or beaches? Describe the place you like to visit and why you like to go there.", "배경 설문에서, 당신은 국내 여행을 즐긴다고 했습니다. 어디를 방문하길 좋아하나요? 산과 해변 중 어느곳을 더 선호하나요? 당신이 가기 좋아하는 장소와그곳을 가기 좋아하는 이유를 설명해 주세요.", "묘사", ""], ["In your background survey, you indicated that you enjoy domestic travel. What are the popular destinations in your country? Why is it popular?", "배경 설문에서, 당신은 국내 여행을 즐긴다고 했습니다. 당신의 나라에서 인기가 많은 여행지는 어디인가요? 왜 인기가 많나요?", "묘사", ""], ["Before you travel, what do you usually prepare for your trip? What things do you include in your luggage? Please list a few items you take with you.", "여행 가기 전, 당신은 주로 여행을 위해 무엇을 준비하나요? 당신의 여행 가방에 어떤 물건들을 담나요? 당신이 가져가는 몇몇 물건들을 나열해 주세요.", "묘사", ""], ["People must prepare before they travel. What do you do to prepare for travel? Do you research in advance or make reservations? What special things do you do? Please describe your preparations in detail.", "사람들은 여행하기 전에 준비를 해야 합니다. 당신은여행 준비를 위해 무엇을 하나요? 미리 조사를 하거나 예약을 하나요? 어떤 특별한 것을 하나요? 당신이하는 준비를 상세히 설명해 주세요.", "RP", ""], ["More and more people are traveling abroad these days. When did you first travel abroad? Where did you go and who did you go with?", "점점 더 많은 사람들이 요즘 해외로 여행을 갑니다. 당신은 언제 처음 해외로 여행을 갔나요? 어디로 갔고 누구와 함께 갔나요?", "묘사", ""], ["You must have had a trip that was particularly memorable. Describe that trip, and tell me why it was unforgettable. Provide as many details as possible.", "당신은 특별히 기억에 남는 여행을 한 적이 있을 거예요. 그 여행에 대해 묘사하고 그것이 왜 잊지 못할 여행인지 이야기해 주세요. 되도록 상세한 내용을 많이제시하세요.", "RP", ""], ["What is the most memorable experience you have had while traveling? When and where did you go? What happened? Why was it memorable? Describe the experience in detail.", "여행을 하며 겪은 가장 기억에 남는 경험은 무엇인가요? 언제 어디로 여행을 갔나요? 무슨 일이 일어났나요? 왜 그 경험이 기억에 남았나요? 그 경험을 상세히 설명해 주세요.", "경험", ""], ["You may have faced a problem while traveling. What kind of situation was it? What happened? How did you handle the problem? Did you get any help from other people?", "당신은 여행 도중에 문제에 직면한 적이 있을 것입니다. 어떤 종류의 상황이었나요? 무슨 일이 일어났나요? 어떻게 그 문제를 해결했나요? 다른 사람들로부터 도움을 받았나요?", "경험", ""], ["In your background survey, you indicated that you prefer to stay at home during vacations. How do you spend your vacations at home? What do you usually do? Give me as many details as possible.", "배경 설문에서, 당신은 집에서 휴가를 보내는 것을 선호한다고 했습니다. 집에서 어떻게 휴가를 보내나요? 보통 무엇을 하나요? 되도록 상세히 설명해 주세요.", "묘사", ""], ["I would like to know about the most memorable vacation you have spent at home. When was it? What did you do and who were you with? Why was it so memorable?", "당신이 집에서 보냈던 가장 기억에 남는 휴가에 대해알고 싶어요. 그것은 언제였나요? 당신은 무엇을 했고, 누구와 함께였나요? 그것이 왜 그렇게 기억에 남았나요?", "경험", ""], ["Now, tell me about an unusual or unexpected experience you had during a vacation you spent at home. Why was it so memorable? Who were you with? Where were you at? What are some things or events that you remember?", "이제, 여러분이 집에서 보낸 휴가 동안 겪었던 특이하거나 예상치 못한 경험에 대해 말해보세요. 왜 그것이그렇게 기억에 남을까요? 여러분은 누구와 함께 있었나요? 어디에 있었나요? 여러분이 기억하는 어떤 것들이나 사건들이 있나요?", "경험", ""], ["Tell me about a memorable experience you had as a child. It could be a special event with family or friends, or a surprising encounter you had with someone. Describe it in detail.", "어린 시절에 가졌던 기억에 남는 경험에 대해 말해보세요. 그것은 가족이나 친구들과의 특별한 행사이거나 누군가와의 놀라운 만남일 수도 있습니다. 그것을자세히 설명하세요.", "경험", ""], ["Why do you think people need vacations? What purposes do you think vacations have for different people? How do people approach their vacations differently?", "당신은 사람들이 왜 휴가가 필요하다고 생각하나요? 서로 다른 사람들에게 휴가가 어떤 목적을 갖는다고생각하나요? 사람들이휴가를 어떻게 다르게 생각하나요?", "묘사", ""], ["Going for a vacation can be different now from the past. What are the differences in going for a trip between nowadays and the past? What has evolved?", "휴가를 떠나는 것은 오늘날은 과거와 다를 수 있습니다. 오늘날과 과거에서의 여행을 떠나는 차이점은 무엇이 있나요? 어떤 점이 진화했나요?", "비교", "IH-AL"], ["What are the concerns or problems people have when going for a trip? How do people handle those? What are they about?", "사람들이 여행을 떠날때 염려하거나 갖는 문제는 무엇이 있나요? 사람들은 그걸 어떻게 해결하나요? 어떤 문제가 있나요?", "이슈", "AL"], ["I’d like to give you a situation to act out. Imagine that you are planning to go on a trip with your friend. Call a travel agency and ask 3 or 4 questions about the trip you want to go on.", "상황을 줄테니 연기해보세요. 여러분이 친구와 여행을 계획하고 있다고 상상해 보세요. 여행사에 전화해서 여러분이 가고 싶은 여행에 대해 서너 가지 질문을하세요.", "RP", ""], ["I’d like to give you a situation to act out. Imagine that you are planning to go on a trip. Call a travel agency and ask 3 or 4 questions to make a reservation for a hotel room.", "상황을 줄테니 연기해보세요. 여행을 계획하고 있다고 생각을 해보세요. 여행사에 전화해서 3, 4가지 질문을 하시면 호텔 방을 예약하실 수 있습니다.", "RP", ""], ["I’m sorry, but there is a problem I need you to resolve. You arrived at the airport and found out there is a problem with your flights. Your flight got canceled and all other flights are full. Call the travel agency , explain the situation, and give 2 or 3 suggestions.", "죄송하지만 해결해야 할 문제가 있습니다. 공항에 도착하셔서 항공편에 문제가 있음을 알게 되셨습니다. 항공편이 취소되었고 다른 항공편은 모두 만석입니다. 여행사에 전화해서 상황을 설명하고 2~3번의 제안을 하세요.", "RP", ""], ["I’m sorry, but there is a problem I need you to resolve. There is a problem with the trip package you have already booked. Call the travel agency , explain the situation, and give 2 or 3 suggestions.", "죄송하지만 해결해야 할 문제가 있습니다. 이미 예약하신 여행 패키지에 문제가 있습니다. 여행사에 전화해서 상황을 설명하고 2~3가지 제안을 하세요.", "RP", ""], ["I’m sorry, but there is a problem I need you to resolve. There is a problem with the trip you have already booked. Call your friend, explain the situation, and suggest 2 or 3 solutions.", "죄송하지만 해결해야 할 문제가 있습니다. 이미 예약하고자 하는 여행이 예약이 다 찼습니다. 친구에게 전화해서 상황을 설명하고 2~3가지 해결책을 제시해주세요.", "RP", ""], ["I’d like to give you a situation to act out. Imagine that you are staying at a hotel and have a free day to explore the city. Go to the front desk and ask 3 or 4 questions about what to do in the city.", "상황을 줄테니 연기해보세요. 여러분이 호텔에 묵고도시를 탐험할 수 있는 자유로운 하루를 보내고 있다고 상상해 보세요. 프런트에 가서 도시에서 무엇을 해야 할지에 대해 서너 가지 질문을 하세요.", "RP", ""], ["I'm sorry, but there is a problem I need you to resolve. You left your bag in the taxi on the way to hotel. Call the taxi company, explain what happened, and ask them how you can retrieve the bag.", "죄송하지만 해결해야 할 문제가 있습니다. 호텔로 가는 길에 택시 안에 가방을 두고 오셨네요. 택시 회사에 전화해서 어떻게 된 일인지 설명하고 가방을 회수할 수 있는 방법을 물어보세요.", "RP", ""], ["I’d like to give you a situation to act out. Let’s suppose that you are visiting New York on vacation. You go to a car rental agency to rent a car. Ask 3 or 4 questions to a car rental agent about renting a car.", "상황을 줄테니 연기해보세요. 휴가차 뉴욕을 방문한다고 가정해 보겠습니다. 렌터카 업체에 차를 빌리러갑니다. 렌터카 업체에 차를 빌리는 것에 대해 서너가지 질문을 하세요.", "RP", ""], ["I’m sorry, but there is a problem I need you to resolve. There is a problem with your non-US driver’s license. Explain information on your license and why it is valid.", "죄송하지만 해결해야 할 문제가 있습니다. 미국것이아닌 운전면허증에 문제가 있습니다. 면허증에 대한정보와 유효한 이유를 설명하십시오.", "묘사", ""]]}, {"ch": "CH13", "title": "교통수단", "q": [["What is public transportation like in your country? Tell me which type of public transportation you prefer to use and why. Provide as many details in your response as possible.", "당신의 나라의 대중교통은 어떤가요? 어떤 종류의 대중교통을 이용하는 것을 선호하는지와 그 이유를 이야기해주세요. 되도록 답변에 상세한 내용을 많이 제시하세요.", "RP", ""], ["Can you tell me about the public transportation system in your country? Which type of transportation do you use the most and why? Give me as many details as possible.", "당신 나라의 대중교통에 대해 이야기해 줄 수 있나요? 당신은 어떤 종류의 대중교통을 가장 많이 이용하며, 그 이유는 무엇인가요? 되도록 상세히 설명해주세요.", "묘사", ""], ["I would like to know about the transportation people in your country use. What do people take on weekdays? How about on the weekends? And what do people use when they travel to the countryside?", "당신 나라에서 사람들이 이용하는 교통수단에 대해알고 싶습니다. 사람들은 평일에 어떤 걸 타나요? 주말에는 어떤가요? 그리고 사람들은 지방으로 여행을갈 때 무엇을 이용하나요?", "묘사", ""], ["Sometimes riding the subway or bus can be uncomfortable. Have you ever had any problems while taking public transportation? Please describe your experience in detail.", "가끔 지하철이나 버스를 타는 것은 불편할 수 있습니다. 대중교통을 이용하면서 문제가 있었던 적이 있나요? 당신의 경험에 대해 상세히묘사해 주세요.", "경험", ""], ["You may have had a time when you faced an uncomfortable situation while using the subway or bus. Can you tell me about that experience? When did it occur? How did you handle the situation?", "당신이 지하철이나 버스를 이용하면서 불편한 상황에 직면한 때가 있었을 것입니다. 그 경험에 대해 이야기해 줄 수 있나요? 언제 그 일이 일어났나요? 어떻게 그 상황을 해결했나요?", "경험", ""], ["Public transportation systems are constantly being improved. Have there been any changes to the public transportation system in your city since you were young? Please tell me about them in detail.", "대중교통 시스템은 끊임없이 개선되고 있는 중입니다. 어린 시절 이래로 당신의 도시에서 대중교통 시스템에 어떤 변화들이 있었나요? 그것들에 대해 상세히이야기해 주세요.", "묘사", ""], ["I’d like to know how the public transportation system in your country has changed over time. What are the differences between the types of ransportation you used as a child and the types you use today? Provide as many details as possible.", "당신 나라의 대중교통 시스템이 시간이 흐르면서 어떻게 변해왔는지 알고 싶어요. 어릴 때 당신이 이용했던 대중교통과 오늘날 당신이 이용하는 대중교통의차이는 무엇인가요? 되도록 상세히 설명해 주세요.", "비교", "IM3"]]}, {"ch": "CH14", "title": "병원·건강", "q": [["Tell me about a healthy person you know. What does he or she look like? What kind of food does he or she like to eat? How did you meet him or her? Provide as many details as possible.", "당신이 아는 가장 건강한 사람에 대해 이야기해 주세요. 그 사람은 어떻게 생겼나요? 그 사람은 어떤 종류의 음식을 즐겨 먹나요? 당신은 그 사람을 어떻게 만났나요? 되도록 상세히설명해 주세요.", "묘사", ""], ["There are many different ways to stay healthy. What do you think a person should do to stay healthy? Give me as many details as possible.", "건강을 유지하기 위한 여러 가지 방법들이 많이 있습니다. 당신은 사람들이 건강을 유지하기 위해 무엇을해야 한다고 생각하나요? 가능한 한 상세한 내용을많이 알려주세요.", "묘사", ""], ["Many people put a lot of effort into keeping themselves fit. Is there anything special that you do to keep healthy? Tell me what you do, and explain why you do it.", "많은 사람들은 건강을 유지하기 위해 많은 노력을 기울입니다. 당신은 건강을 지키기 위해 특별히 하는 것이 있나요? 당신이 무엇을 하는지, 그리고 그것을 왜하는지 이야기해 주세요.", "묘사", ""], ["Tell me about a health problem that you or a person close to you had. What were the symptoms? What did you or the other person do to get over it?", "당신 또는 당신과 가까운 사람이 겪었던 건강상의 문제에 대해 이야기해 주세요. 증세는 무엇이었나요? 당신 또는 다른 사람은 그것을 이겨내기 위해 무엇을했나요?", "경험", ""], ["Have you ever had to quit doing something for health reasons? What was it that you had to give up?", "건강상의 이유로 어떤 일을 하는 것을 그만둬야 했던적이 있나요? 당신이 포기해야 했던 것이 무엇이었나요?", "경험", ""], ["Tell me about the first time you visited a dental clinic. When was it? Why did you go there? Tell me about it in as much detail as possible.", "치과를 처음 갔을 때에 대해 이야기해 주세요. 언제였나요? 왜 그곳을 갔었나요? 그것에 대해 되도록 상세히 이야기해 주세요.", "묘사", ""], ["Going to the dentist can be stressful. Are you afraid to visit the dentist? Have you ever had an unpleasant experience at a dental clinic?", "치과에 가는 것은 스트레스가 될 수 있습니다. 당신은치과를 방문하는 것이 두렵나요? 당신은 치과에서 불쾌한 경험을 한 적이 있나요?", "경험", ""], ["Are the clinics you go to these days different than the ones you went to as a child? How are they different? Describe the differences between them in as much detail as possible.", "당신이 요즘 다니는 병원은 당신이 어렸을 때 다녔던병원과는 다른가요? 둘은 서로 어떻게 다른가요? 그둘 사이의 차이점에 대해 되도록 상세히 설명해 주세요.", "비교", "IM3"], ["Maintaining a balance between work responsibilities and health is often challenging. Can you share your strategies for achieving this balance? Are there specific challenges you face, and how do you navigate them to ensure both professional and personal well-being?", "업무 책임과 건강 사이의 균형을 유지하는 것은 종종어렵습니다. 이 균형을 이루기 위한 여러분의 전략을공유할 수 있나요? 여러분이 직면하는 특정한 도전들이 있나요? 그리고 직업적인 그리고 개인적인 행복을보장하기 위해 어떻게 그들을 탐색하나요?", "묘사", ""], ["The awareness of health has improved significantly. What are the differences in how people stay healthy compared to the past? Please tell me about them in detail.", "건강에 대한 인식은 많이 향상되었습니다. 과거와 비교했을 때 건강을 유지하는 방법에 어떤 차이가 있나요? 자세히 알려주세요.", "비교", "IH-AL"], ["Please tell me about the health issues or concerns that people are talking about. What are the causes of the problem? How can people address the concerns?", "사람들이 이야기하고 있는 건강 문제나 염려에 대해알려주세요. 문제의 원인은 무엇인가요? 사람들은 이러한 우려를 어떻게 해결할 수 있을까요?", "이슈", "AL"]]}, {"ch": "CH15", "title": "인터넷·웹사이트·전화", "q": [["Tell me about a website that you usually visit. What services does this website offer, and what things can you do on it? What got you interested in the website? Explain in detail.", "당신이 주로 방문하는 웹사이트에 대해서 이야기해주세요. 이 사이트에서는 어떤 서비스를 제공하며, 당신은 이 사이트에서 어떤일을 할 수 있나요? 무엇 때문에 그 웹사이트에 관심을 갖게 되었나요? 상세히 설명해 주세요.", "묘사", ""], ["When you work on projects, do you use the Internet? Please explain what you use it for and why it is useful. Provide as many details in your response as possible.", "프로젝트를 할 때, 당신은 인터넷을 사용하나요? 무엇을 위해 그것을 사용하고 왜 유용한지 설명해 주세요. 되도록 답변에 상세한 내용을 많이제시하세요.", "RP", ""], ["When job seeking, people can get much information online. What websites do you often visit when job seeking? What information can you get from those websites? Please tell me about it in detail.", "구직할 때, 사람들은 온라인에서 많은 정보를 얻을 수있습니다. 구직할 때 어떤 웹사이트를 자주 방문하나요? 그 웹사이트에서 어떤 정보를 얻을 수 있나요? 그것에 대해 자세히 알려주세요.", "묘사", ""], ["Everyone uses the Internet these days. Where and when do you use it? What do you mainly use the Internet for?", "요즘에는 모든 사람들이 인터넷을 사용합니다. 당신은 언제 그리고 어디에서 인터넷을 사용하나요? 주로어떤 목적으로 인터넷을 사용하나요?", "묘사", ""], ["Everyone uses the Internet regularly these days. When did you use the Internet for the first time? Do you use it a lot these days? How much time do you spend on the Internet each day?", "요즘 모든 사람들이 정기적으로 인터넷을 사용합니다. 당신은 언제 처음으로 인터넷을 사용했나요? 요즘 인터넷을 많이 사용하나요? 하루 인터넷에 얼마나많은 시간을 보내나요?", "묘사", ""], ["Do you surf the Internet often? What were websites like in the past? Have they changed since you first started surfing the Internet? How have they changed? Please compare the websites of today to the websites of the past.", "당신은 인터넷 서핑을 자주 하나요? 과거에는 웹사이트들이 어땠나요? 당신이 인터넷 서핑을 시작했을 때에 비해 웹사이트들이 달라졌나요? 어떻게 달라졌나요? 현재의 웹사이트를 과거의 웹사이트와 비교해 주세요.", "비교", "IH"], ["Please tell me about the issues or concerns that people talk about internet uses. What are the causes of the problem? How can people address the concerns?", "사람들이 인터넷 사용에 대해 얘기하는 문제점이나염려에 대해 알려주세요. 문제의 원인은 무엇인가요? 사람들은 이러한 우려를 어떻게 해결할 수 있을까요?", "이슈", "AL"], ["There are many different types of computers and programs available now. What kind of computer and programs do you have? Please describe them in detail.", "요즘 이용할 수 있는 여러 가지 종류의 컴퓨터와 프로그램이 많이 있습니다. 당신은 어떤 종류의 컴퓨터와프로그램을 가지고 있나요? 그것들에 대해 상세히 묘사해 주세요.", "묘사", ""], ["How has the internet changed the way people communicate, and what are the positive and negative aspects of this change?", "인터넷은 사람들이 소통하는 방법을 변화시키고, 이변화에 대한 긍정적인 측면과 부정적인 측면은 무엇입니까?", "비교", "IH-AL"], ["Where do you usually talk on the phone? Is there a particular place that you use the phone a lot? Please describe your habits in detail.", "당신은 보통 어디에서 전화 통화를 하나요? 당신이특별히 전화 통화를 많이 하는 장소가 있나요? 당신의 습관에 대해 되도록 상세히 설명해 주세요.", "RP", ""], ["Do you talk on the phone with your friends often? How frequently do you talk and at what time of day? What do you usually talk about and for how long?", "당신은 친구와 전화 통화를 자주 하나요? 얼마나 자주 통화하며, 하루 중 언제 하나요? 보통 무엇에 대해이야기하고, 통화를 얼마 동안 하나요?", "RP", ""], ["Can you describe a memorable experience you have had while talking on the phone? Who were you talking with? What happened? What was so special about it?", "전화 통화를 하는 도중에 겪었던 기억에 남는 경험을설명해 줄 수 있나요? 누구와 이야기를 나누고 있었나요? 무슨 일이 있었나요? 그것이 왜 그렇게 특별했나요?", "RP", ""], ["Sometimes problems can occur when using cell phones. Think about one of the problems or uncomfortable experienced while you were using your cell phone. What was the problem? How did you handle it?", "가끔 휴대폰을 사용할 때 문제가 발생할 수 있습니다. 휴대폰을 사용하는 동안 경험했던 문제점들 또는 불편했던 점들 중 하나에 대해 생각해보세요. 무엇이 문제였을까요? 어떻게 대처했나요?", "경험", ""], ["I’d like to give you a situation to act out. You are planning to purchase a new cell phone. Imagine that you go to a store, and ask the salesperson 3 or 4 questions to learn about the cell phone.", "상황을 줄테니 연기해보세요. 당신은 새로운 핸드폰을 구매하려고 합니다. 매장에 가서 판매직원에게 휴대폰에 대해 3, 4가지 질문을 해보세요.", "RP", ""], ["I’m sorry, but there is a problem I need you to resolve. After purchasing the cell phone, you find that you are not able to make any phone calls. Leave the voicemail to the salesperson at the store, explain your situation and suggest 2 or 3 solutions to solve this issue.", "죄송하지만 해결해야 할 문제가 있습니다. 휴대폰을구매를 했는데, 전화를 걸 수가 없습니다. 매장에게음성 메시지를 남기고 상황을 설명한 후 이 문제를 해결하기 위한 2~3가지 해결책을 제시하세요.", "RP", ""]]}, {"ch": "CH16", "title": "패션", "q": [["I’d like to know the kinds of clothes people typically wear in your country. What do they wear when they are relaxing at home? How is it different from what they wear at work?", "당신의 나라에서 사람들이 보통 입는 옷의 종류를 알고 싶어요. 사람들은 집에서 휴식을 취할 때 무엇을입나요? 그것은 사람들이 직장에서 입는 것과 어떻게다른가요?", "비교", "IH"], ["Tell me about the changes in fashion trends in your country. What kind of clothes did people wear in the past? What do people wear these days? Describe the differences between them.", "당신 나라의 패션 트렌드의 변화에 대해 이야기해 주세요. 과거에는 사람들이 어떤 종류의 옷을 입었나요? 요즘은 사람들이 무엇을 입나요? 둘 사이의 차이점에 대해 설명해 주세요.", "비교", "IH-AL"], ["What kind of clothes do people in your country usually wear? Do they wear different clothes when they go to work and when they are relaxing? Describe the local attire in as much detail as possible.", "당신 나라의 사람들은 보통 어떤 종류의 옷을 입나요? 일하러 갈 때와 쉴 때 다른 옷을 입나요? 지역의복장에 대해 되도록 상세히 설명해 주세요.", "묘사", ""], ["I want you to give you a situation to act out. You need to buy some new clothes for a special occasion. Imagine you walk into a store, and ask the salesperson in a clothing store about the clothes you're looking for.", "당신에게 상황을 줄테니 연기해보세요. 당신은 특별한 이벤트를 위해 새 옷을 사야 합니다. 가게에 들어와서 옷 가게의 판매원에게 당신이 찾고 있는 옷에 대해 물어보세요.", "RP", ""], ["I want you to give you a situation and want you to act it out. You're interested in buying clothes online, and I'm a customer service representative. Ask questions about the online shopping process, including shipping, returns, and any discounts available.", "당신에게 상황을 줄테니 연기해보세요. 당신은 온라인으로 옷을 사는 것에 관심이 있고, 나는 고객 서비스 담당자입니다. 배송, 반품 및 할인을 포함한 온라인 쇼핑 과정에 대해 질문하십시오.", "RP", ""], ["I'm sorry, but there's a problem you need to resolve. You recently purchased a clothing item, but upon getting home, you realize it doesn't fit quite right. You want to return or exchange it. Call the store, explain your situation and find out how to resolve the problem.", "죄송하지만 해결해야 할 문제가 있습니다. 최근에 옷을 구매하셨는데, 집에 도착하자마자 옷이 잘 맞지 않는다는 것을 알게 되실 겁니다. 반품이나 교환을 원하시게 됩니다. 매장에 전화해서 상황을 설명하고 문제를 해결할 방법을 찾아보세요.", "RP", ""], ["Tell me about the last time you went shopping for clothes. What did you buy and who did you go with?", "당신이 마지막으로 옷을 사러 갔던 때에 대해 이야기해 주세요. 무엇을 샀고, 누구와 함께 갔나요?", "경험", ""], ["Can you tell me about the role of digital platforms in the fashion industry? How has social media and online presence influenced fashion trends, marketing, and consumer engagement?", "패션 산업에서 디지털 플랫폼의 역할에 대해 말씀해주시겠습니까? 소셜 미디어와 온라인 존재감이 패션트렌드, 마케팅, 소비자 참여에 어떤 영향을 미쳤습니까?", "이슈", "AL"], ["Tell me about the relation of fashion and technology. How are advancements in technology influencing the design, production, and consumption of fashion?", "패션과 기술의 관계에 대해 알려주세요. 기술의 발전이 패션의 디자인, 생산, 소비에 어떤 영향을 미치는가요?", "이슈", "AL"], ["I’d like to give you a situation to act out. Imagine that you want to go shopping with your friend. Call your friend and ask 3 or 4 questions about shopping together.", "상황을 줄테니 연기해보세요. 당신이 친구와 쇼핑을하고 싶다고 상상해 보세요. 친구에게 전화해서 함께쇼핑에 대해 서너 가지 질문을 해보세요.", "RP", ""], ["I’m sorry. You already made an appointment with your friend, but a problem has come up. Now, you won’t be available on the day you made an appointment. Call your friend and explain the situation. Then give two or three alternatives.", "죄송합니다. 이미 친구와 약속을 잡으셨는데 문제가생겼습니다. 지금은 약속하신 날에 시간이 안 됩니다. 친구에게 전화해서 상황을 설명해주세요. 그럼 2~3가지 대안을 주세요.", "RP", ""]]}, {"ch": "CH17", "title": "산업·기술", "q": [["Tell me about one of the major industries or companies in your nation. How has this industry or company achieved such a high level of success?", "당신 나라의 주요 산업이나 회사들 중 하나에 대해 이야기해 주세요. 이 산업 또는 회사가 어떻게 그렇게높은 수준의 성공을 달성할 수 있었나요?", "비교", "IH-AL"], ["Describe an industry or company in your country that has undergone significant change. What is its current state? Describe some of the changes that have occurred. Provide specific examples of how that industry or company has developed.", "당신의 나라에서 상당한 변화를 겪은 산업이나 회사에 대해 설명해 주세요. 현재 상황은 어떤가요? 일어났던 몇몇 변화에 대해 설명해 주세요. 그 산업 또는회사가 어떻게 발전했는지에 대해 구체적인 예를 들어주세요.", "비교", "IH-AL"], ["What kind of impact does the industry or company you described earlier have on society? What are some of its positive contributions? Provide as many details as possible.", "당신이 앞서 설명한 산업 또는 회사가 사회에 어떤 종류의 영향을 미칩니까? 그것의 긍정적인 공헌은 어떤것들인가요? 되도록 상세히 설명해 주세요.", "묘사", ""], ["Please tell me about emerging industries in your country. What sectors show promise for growth, and how are they contributing to economic development? Can you tell me about any government support for these emerging industries?", "당신 나라의 신흥 산업에 대해 말씀해 주십시오. 어떤분야가 성장 가능성을 보이고 있으며, 경제 발전에 어떻게 기여하고 있습니까? 이러한 신흥 산업에 대한정부의 지원은 무엇인지 말씀해 주시겠습니까?", "묘사", ""], ["Can you tell me about the current challenges and opportunities facing industries in your country? How are companies addressing challenges, and what strategies are being used for growth?", "귀하의 국가의 산업이 당면한 도전과 기회에 대해 말씀해 주시겠습니까? 기업들은 도전에 어떻게 대처하고 있으며, 성장을 위해 어떤 전략을 사용하고 있습니까?", "묘사", ""], ["Technology is advancing more rapidly than ever. Can you tell me about the way technology has been changing? What changes have occurred since you were a child? Provide me with as many details as possible.", "기술은 그 어느 때보다도 빠르게 발전하고 있습니다. 기술이 변화해 온 방식에 대해 이야기해 줄 수 있나요? 당신이 어렸을 때 이후로 어떠한 변화가 일어났나요? 되도록 상세히 설명해 주세요.", "묘사", ""], ["Have you ever experienced a problem related to technology? For instance, sometimes a device does not work properly or is difficult to use. Describe your technological problem in detail. How did you handle it?", "기술과 관련된 문제를 경험하신 적이 있나요? 예를들면, 가끔 기계 장치가 제대로 작동하지 않거나, 사용하기 어렵게 되어 있습니다. 당신이 겪은 기술적 문제를 상세히 설명해 주세요. 그것을 어떻게 해결했나요?", "경험", ""], ["Tell me about the technologies that are popular in your country. Which technology do people use the most there? What is it used for? Can you tell me why they like to use it?", "당신 나라에서 인기 있는 기술에 대해 이야기해 주세요. 당신 나라에서 사람들이 어떤 기술을 가장 많이사용하나요? 그 기술은 어떤 용도로 사용되나요? 사람들이 왜 그것을 즐겨 사용하는지 이야기해 줄 수 있나요?", "묘사", ""]]}, {"ch": "CH18", "title": "은행", "q": [["People go to the bank for many reasons. Why do people go to the bank? Please give me as many details as possible.", "사람들은 여러 이유로 은행에 갑니다. 사람들이 왜 은행에 가나요? 가능한 한 상세한 내용을 많이 알려주세요.", "묘사", ""], ["Tell me about the banks in your country. Where are they located? When do they open and close? What do they look like? Please describe in as much detail as possible.", "당신의 나라의 은행에 대해 이야기해 주세요. 은행들은 어디에 위치해 있나요? 언제 문을 열고 닫나요? 어떻게 생겼나요? 가능한 한 상세히 묘사해 주세요.", "묘사", ""], ["Tell me about the last time you went to a bank. What did you do at the bank? Please describe your experience in detail.", "당신이 마지막으로 은행에 갔던 때에 대해 이야기해주세요. 당신은 은행에서 무엇을 했나요? 당신의 경험을 상세히 묘사해 주세요.", "경험", ""], ["Have you ever experienced any problems at a bank? For instance, sometimes ATMs malfunction. What sort of problem did you face, and how did you deal with it?", "당신은 은행에서 문제를 경험한 적이 있었나요? 예를들어, 가끔 ATM은 고장 납니다. 당신은 어떤 종류의문제에 직면했고, 그것을 어떻게 처리했나요?", "경험", ""], ["Have there been any changes to the banks in your country since you were a child? How were they in the past? How are they now? Please describe the changes in detail.", "당신이 어렸을 때 이후로 당신 나라의
